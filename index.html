<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>MediFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sky:#e8f4fd;--sky2:#d0e9fb;--sky3:#3b9ade;
  --mint:#e6f9f0;--mint2:#a8eac8;--mint3:#22a366;
  --peach:#fff0e8;--peach2:#ffd4b8;--peach3:#e87230;
  --lav:#f0eefe;--lav2:#d4ccfa;--lav3:#6c5ce7;
  --rose:#ffeef2;--rose2:#ffc4d0;--rose3:#d63864;
  --sun:#fffbe6;--sun2:#ffe38a;--sun3:#c98a00;
  --white:#ffffff;--offwhite:#f7f9fc;--light:#eef2f7;
  --text:#1a2332;--t2:#4a5568;--t3:#8896a8;
  --border:#dde4ed;--r:20px;--rs:14px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
body{background:var(--offwhite);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column}

/* ── Top Header ── */
.header{background:var(--white);border-bottom:1.5px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:40px;height:40px;background:var(--sky3);border-radius:14px;display:grid;place-items:center;font-size:20px}
.logo-name{font-size:20px;font-weight:800;color:var(--text)}
.logo-name span{color:var(--sky3)}
.header-date{font-size:13px;color:var(--t3);font-weight:600;display:none}
@media(min-width:480px){.header-date{display:block}}

/* ── Page wrapper ── */
.page{flex:1;padding:20px 16px calc(80px + var(--safe-b));max-width:680px;margin:0 auto;width:100%}

/* ── Section title ── */
.sec-title{font-size:13px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;padding-left:4px}

/* ── Big stat cards ── */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.stat-card{border-radius:var(--r);padding:18px 16px;cursor:pointer;transition:transform .12s;border:1.5px solid transparent;position:relative;overflow:hidden}
.stat-card:active{transform:scale(.97)}
.stat-card.sky{background:var(--sky);border-color:var(--sky2)}
.stat-card.mint{background:var(--mint);border-color:var(--mint2)}
.stat-card.peach{background:var(--peach);border-color:var(--peach2)}
.stat-card.lav{background:var(--lav);border-color:var(--lav2)}
.stat-icon{font-size:28px;margin-bottom:8px;line-height:1}
.stat-num{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-card.sky .stat-num{color:var(--sky3)}
.stat-card.mint .stat-num{color:var(--mint3)}
.stat-card.peach .stat-num{color:var(--peach3)}
.stat-card.lav .stat-num{color:var(--lav3)}
.stat-label{font-size:13px;font-weight:700;color:var(--t2)}

/* ── Big action buttons ── */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.action-btn{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:20px 14px;cursor:pointer;text-align:center;transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:10px}
.action-btn:active{transform:scale(.96);background:var(--light)}
.action-btn:hover{border-color:var(--sky3);background:var(--sky)}
.action-icon{font-size:36px;line-height:1}
.action-label{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
.action-sub{font-size:11px;color:var(--t3);font-weight:600}

/* ── Patient list ── */
.patient-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .12s;margin-bottom:10px}
.patient-card:active{transform:scale(.98)}
.patient-card:hover{border-color:var(--sky3);background:var(--sky)}
.avatar{width:52px;height:52px;border-radius:50%;display:grid;place-items:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.patient-info{flex:1;min-width:0}
.patient-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px}
.patient-meta{font-size:12px;color:var(--t3);font-weight:600}
.patient-badge{background:var(--light);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--t2);flex-shrink:0}
.patient-badge.allergy{background:var(--peach);color:var(--peach3)}

/* ── Appointment cards ── */
.appt-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .12s}
.appt-card:active{transform:scale(.98)}
.appt-card.upcoming{border-left:5px solid var(--sky3);border-radius:0 var(--r) var(--r) 0}
.appt-card.completed{border-left:5px solid var(--mint3);border-radius:0 var(--r) var(--r) 0}
.appt-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.appt-name{font-size:16px;font-weight:700}
.appt-chip{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700}
.appt-chip.upcoming{background:var(--sky);color:var(--sky3);border:1.5px solid var(--sky2)}
.appt-chip.completed{background:var(--mint);color:var(--mint3);border:1.5px solid var(--mint2)}
.appt-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);font-weight:600;margin-bottom:4px}
.appt-row:last-child{margin-bottom:0}
.appt-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}

/* ── Filter tabs ── */
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.filter-tabs::-webkit-scrollbar{display:none}
.ftab{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--t2);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.12s;font-family:'Nunito',sans-serif}
.ftab.act{background:var(--sky3);border-color:var(--sky3);color:#fff}

/* ── Booking form ── */
.form-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.form-title{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-title-icon{font-size:24px}
.field-label{font-size:13px;font-weight:700;color:var(--t2);margin-bottom:6px;display:block}
.field-input{width:100%;background:var(--offwhite);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 14px;color:var(--text);font-size:15px;font-weight:600;outline:none;font-family:'Nunito',sans-serif;transition:border .15s;margin-bottom:14px}
.field-input:focus{border-color:var(--sky3);background:#fff}
.field-input::placeholder{color:var(--t3);font-weight:600}
textarea.field-input{resize:none;min-height:80px;line-height:1.5}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.time-chip{padding:10px 6px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--white);font-size:13px;font-weight:700;color:var(--t2);cursor:pointer;text-align:center;transition:.12s;font-family:'Nunito',sans-serif}
.time-chip:active{transform:scale(.95)}
.time-chip.sel{background:var(--sky3);border-color:var(--sky3);color:#fff}
.submit-btn{width:100%;padding:16px;border-radius:var(--rs);border:none;background:var(--sky3);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:active{transform:scale(.98);background:#2d87cc}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.cancel-btn{width:100%;padding:13px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--white);color:var(--t2);font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:8px}

/* ── Success banner ── */
.success-banner{background:var(--mint);border:1.5px solid var(--mint2);border-radius:var(--r);padding:18px 16px;display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.success-icon{font-size:32px;flex-shrink:0}
.success-text .bold{font-size:16px;font-weight:800;color:var(--mint3);margin-bottom:4px}
.success-text .sub{font-size:13px;color:#2d7a50;font-weight:600}

/* ── Detail view ── */
.detail-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.detail-avatar{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0}
.detail-name{font-size:22px;font-weight:800}
.detail-sub{font-size:13px;color:var(--t3);font-weight:600;margin-top:2px}
.info-block{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1.5px solid var(--light)}
.info-row:last-child{border-bottom:none;padding-bottom:0}
.info-row:first-child{padding-top:0}
.info-key{font-size:13px;color:var(--t3);font-weight:600}
.info-val{font-size:14px;font-weight:700;color:var(--text)}
.back-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--white);color:var(--t2);font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:20px;width:fit-content}

/* ── Prescription pills ── */
.rx-item{background:var(--lav);border:1.5px solid var(--lav2);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px}
.rx-name{font-size:15px;font-weight:800;color:var(--lav3);margin-bottom:3px}
.rx-detail{font-size:12px;color:#5a4a9e;font-weight:600}

/* ── Follow-up cards ── */
.fu-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.fu-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.fu-name{font-size:15px;font-weight:800}
.fu-date{font-size:12px;color:var(--t3);font-weight:600;margin-top:2px}
.fu-status{border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700}
.fu-status.ok{background:var(--mint);color:var(--mint3);border:1.5px solid var(--mint2)}
.fu-status.warn{background:var(--sun);color:var(--sun3);border:1.5px solid var(--sun2)}
.fu-note{font-size:13px;color:var(--t2);font-weight:600;background:var(--offwhite);border-radius:10px;padding:10px 12px}
.sim-btn{width:100%;padding:12px;border-radius:var(--rs);border:1.5px solid var(--sky2);background:var(--sky);color:var(--sky3);font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:10px;transition:.12s}
.sim-btn:active{transform:scale(.98)}
.sim-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── WhatsApp bubbles ── */
.wa-wrap{background:#e8f5e9;border-radius:var(--rs);padding:12px;margin-top:10px}
.wa-header{font-size:11px;font-weight:700;color:#4caf50;text-align:center;margin-bottom:10px;letter-spacing:.5px}
.wa-msg{display:flex;margin-bottom:8px}
.wa-msg.r{justify-content:flex-end}
.wa-bubble{border-radius:12px;padding:10px 14px;max-width:80%;font-size:13px;font-weight:600;line-height:1.5;white-space:pre-wrap}
.wa-clinic{background:#fff;color:#1a2332;border-radius:4px 12px 12px 12px}
.wa-patient{background:#dcf8c6;color:#1a2332;border-radius:12px 4px 12px 12px}
.wa-time{font-size:10px;color:var(--t3);margin-top:3px;font-weight:600}

/* ── Empty state ── */
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:700}

/* ── Search bar ── */
.search-bar{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 14px 12px 40px;color:var(--text);font-size:15px;font-weight:600;outline:none;font-family:'Nunito',sans-serif;margin-bottom:16px;transition:border .15s;position:relative}
.search-bar:focus{border-color:var(--sky3)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1.5px solid var(--border);z-index:100;padding-bottom:var(--safe-b)}
.bnav-inner{display:flex;height:64px}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:8px 4px;transition:all .12s;font-family:'Nunito',sans-serif;position:relative}
.bnav-btn.act .bnav-icon{transform:scale(1.15)}
.bnav-dot{position:absolute;top:8px;right:calc(50% - 18px);width:7px;height:7px;background:var(--rose3);border-radius:50%;border:2px solid var(--white)}
.bnav-icon{font-size:22px;line-height:1;transition:transform .12s}
.bnav-label{font-size:11px;font-weight:700;color:var(--t3)}
.bnav-btn.act .bnav-label{color:var(--sky3)}

/* ── Modal overlay ── */
.modal-wrap{position:fixed;inset:0;background:rgba(20,30,50,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-sheet{background:var(--white);border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
@media(min-width:640px){
  .modal-wrap{align-items:center}
  .modal-sheet{border-radius:24px;max-height:88vh}
}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px}
.modal-title{font-size:20px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--light);cursor:pointer;font-size:16px;display:grid;place-items:center;flex-shrink:0}

/* ── Utility ── */
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.chip.sky{background:var(--sky);color:var(--sky3);border:1.5px solid var(--sky2)}
.chip.mint{background:var(--mint);color:var(--mint3);border:1.5px solid var(--mint2)}
.chip.peach{background:var(--peach);color:var(--peach3);border:1.5px solid var(--peach2)}
.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-mark">🏥</div>
      <div class="logo-name"><span>Medi</span>Flow</div>
    </div>
    <div class="header-date" id="hdr-date"></div>
  </div>
  <div class="page" id="page"></div>
  <nav class="bottom-nav">
    <div class="bnav-inner" id="bnav"></div>
  </nav>
</div>

<script>
const S = {
  tab: 'home',
  patients: [
    {id:'p1',name:'Priya Sharma',phone:'98201 11111',dob:'1990-03-15',blood:'O+',allergies:'Penicillin',gender:'Female'},
    {id:'p2',name:'Arjun Mehta',phone:'98202 22222',dob:'1985-07-22',blood:'A+',allergies:'None',gender:'Male'},
    {id:'p3',name:'Sunita Patel',phone:'98203 33333',dob:'1972-11-08',blood:'B+',allergies:'Sulfa drugs',gender:'Female'},
    {id:'p4',name:'Rahul Desai',phone:'98204 44444',dob:'1998-01-30',blood:'AB-',allergies:'None',gender:'Male'},
    {id:'p5',name:'Meera Joshi',phone:'98205 55555',dob:'1965-05-12',blood:'A-',allergies:'Aspirin',gender:'Female'},
  ],
  appointments: [
    {id:'a1',pid:'p1',pname:'Priya Sharma',date:'2026-04-05',time:'10:00',symptoms:'Fever, persistent headache since 3 days',status:'upcoming',notes:'',rx:[]},
    {id:'a2',pid:'p2',pname:'Arjun Mehta',date:'2026-04-02',time:'11:30',symptoms:'Lower back pain, difficulty standing',status:'completed',notes:'Muscle strain. Rest for 3 days.',rx:[{name:'Ibuprofen 400mg',dose:'Twice daily after meals',days:5},{name:'Meftal Spas',dose:'Once at night',days:3}]},
    {id:'a3',pid:'p3',pname:'Sunita Patel',date:'2026-04-01',time:'09:00',symptoms:'Diabetes type-2 follow-up, blurred vision',status:'completed',notes:'HbA1c stable. BP slightly high.',rx:[{name:'Metformin 500mg',dose:'Once daily with dinner',days:30},{name:'Amlodipine 5mg',dose:'Once daily morning',days:30}]},
    {id:'a4',pid:'p4',pname:'Rahul Desai',date:'2026-04-07',time:'14:00',symptoms:'Persistent cough, mild fever, sore throat',status:'upcoming',notes:'',rx:[]},
    {id:'a5',pid:'p5',pname:'Meera Joshi',date:'2026-04-03',time:'16:00',symptoms:'Knee pain, swelling in left knee',status:'upcoming',notes:'',rx:[]},
    {id:'a6',pid:'p1',pname:'Priya Sharma',date:'2026-03-15',time:'10:30',symptoms:'Seasonal allergies, runny nose',status:'completed',notes:'Allergic rhinitis confirmed.',rx:[{name:'Cetirizine 10mg',dose:'Once daily at bedtime',days:10}]},
  ],
  followUps: [
    {id:'f1',pid:'p2',pname:'Arjun Mehta',aid:'a2',sent:'2026-04-02T18:00:00',resp:'yes',note:'Feeling much better, back pain reduced'},
    {id:'f2',pid:'p3',pname:'Sunita Patel',aid:'a3',sent:'2026-04-01T18:00:00',resp:'no',note:'Vision still blurry, needs rebooking'},
    {id:'f3',pid:'p1',pname:'Priya Sharma',aid:'a6',sent:'2026-03-15T19:00:00',resp:'yes',note:'Allergy resolved after 3 days'},
  ],
  apptFilter: 'all',
  patSearch: '',
  selPatId: null,
  selApptId: null,
  bookStep: 0,
  bookData: {},
  bookSuccess: false,
  waMessages: {},
  simRunning: null,
  modalApptId: null,
  modalRx: [],
  modalNotes: '',
};

const AV_COLORS = ['#3b9ade','#6c5ce7','#e87230','#22a366','#d63864','#c98a00','#0984e3'];
function avColor(name){let h=0;for(let c of(name||''))h=(h*31+c.charCodeAt(0))%AV_COLORS.length;return AV_COLORS[h]}
function initials(n){return(n||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()||'?'}
function fmtDate(d){if(!d)return'—';try{return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}catch{return d}}
function fmtTime(t){if(!t)return'';const[h,m]=t.split(':');const hr=parseInt(h);return`${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`}
function uid(){return'x'+Date.now()+Math.random().toString(36).slice(2,5)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function setTab(t){S.tab=t;S.selPatId=null;S.selApptId=null;S.bookStep=0;S.bookData={};S.bookSuccess=false;render()}

/* ── Nav ── */
function renderNav(){
  const tabs=[{id:'home',icon:'🏠',label:'Home'},{id:'appointments',icon:'📅',label:'Visits'},{id:'patients',icon:'👥',label:'Patients'},{id:'book',icon:'➕',label:'Book'},{id:'followup',icon:'💬',label:'Check-up'}];
  const upcomingCount=S.appointments.filter(a=>a.status==='upcoming').length;
  document.getElementById('bnav').innerHTML=tabs.map(t=>`
    <button class="bnav-btn ${S.tab===t.id?'act':''}" onclick="setTab('${t.id}')">
      ${t.id==='appointments'&&upcomingCount?`<div class="bnav-dot"></div>`:''}
      <div class="bnav-icon">${t.icon}</div>
      <div class="bnav-label">${t.label}</div>
    </button>`).join('');
}

/* ── Pages ── */
function pageHome(){
  const upcoming=S.appointments.filter(a=>a.status==='upcoming').length;
  const completed=S.appointments.filter(a=>a.status==='completed').length;
  const patients=S.patients.length;
  const fuSent=S.followUps.length;
  const nextAppt=[...S.appointments].filter(a=>a.status==='upcoming').sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
  return`
    <div class="sec-title">Overview</div>
    <div class="stat-row mb20">
      <div class="stat-card sky" onclick="S.apptFilter='upcoming';setTab('appointments')">
        <div class="stat-icon">📅</div>
        <div class="stat-num">${upcoming}</div>
        <div class="stat-label">Upcoming Visits</div>
      </div>
      <div class="stat-card mint" onclick="S.apptFilter='completed';setTab('appointments')">
        <div class="stat-icon">✅</div>
        <div class="stat-num">${completed}</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card peach" onclick="setTab('patients')">
        <div class="stat-icon">👥</div>
        <div class="stat-num">${patients}</div>
        <div class="stat-label">Patients</div>
      </div>

    return stepBar+`
      <div class="form-card">
        <label class="field-label">Patient Name</label>

        <label class="field-label">Phone Number</label>

        ${existing.length?`<div style="font-size:13px;font-weight:700;color:var(--t3);margin-bottom:8px">Or pick an existing patient:</div>
        <div style="display:flex;flex-direction:column;gap:6px">

          <div><div style="font-size:14px;font-weight:700">${esc(p.name)}</div><div style="font-size:11px;color:var(--t3);font-weight:600">${esc(p.phone)}</div></div>

  if(step===1){
    const dates=[
      {label:'Today',val:'2026-04-03'},{label:'Tomorrow',val:'2026-04-04'},
      {label:'Mon Apr 6',val:'2026-04-06'},{label:'Tue Apr 7',val:'2026-04-07'},
      {label:'Wed Apr 8',val:'2026-04-08'},{label:'Thu Apr 9',val:'2026-04-09'},
      {label:'Fri Apr 10',val:'2026-04-10'},{label:'Sat Apr 11',val:'2026-04-11'},

    return stepBar+`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        ${dates.map(dt=>`<button style="padding:14px 10px;border-radius:var(--rs);border:1.5px solid ${d.date===dt.val?'var(--sky3)':'var(--border)'};background:${d.date===dt.val?'var(--sky)':'var(--white)'};color:${d.date===dt.val?'var(--sky3)':'var(--t2)'};font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:.12s" onclick="S.bookData.date='${dt.val}';render()">${dt.label}</button>`).join('')}

      <div class="time-grid" style="grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        ${times.map(t=>`<button class="time-chip ${d.time===t.v?'sel':''}" onclick="S.bookData.time='${t.v}';render()">${t.l}</button>`).join('')}
      </div>
      <button class="submit-btn" onclick="step2Next()" ${!d.time?'disabled':''}>Next →</button>
      <button class="cancel-btn" onclick="S.bookStep=1;render()">← Back</button>`;
  }
  if(step===3){
    const reasons=['Fever / Cold','Back pain','Diabetes check','Eye problem','Knee / Joint pain','Cough','Routine check-up','Other'];

        <div class="info-row"><span class="info-key">📱 Phone</span><span class="info-val">${esc(d.phone)}</span></div>
        <div class="info-row"><span class="info-key">📅 Date</span><span class="info-val">${fmtDate(d.date)}</span></div>
        <div class="info-row"><span class="info-key">⏰ Time</span><span class="info-val">${fmtTime(d.time)}</span></div>
        <div class="info-row"><span class="info-key">🩺 Reason</span><span class="info-val" style="text-align:right;max-width:60%">${esc(d.symptoms)}</span></div>
      </div>
      <div style="background:var(--sky);border-radius:var(--rs);padding:12px 14px;margin-bottom:16px;font-size:13px;font-weight:600;color:var(--sky3)">
        ✅ Everything looks good! Tap confirm to book.
      </div>
      <button class="submit-btn" onclick="confirmBook()">🎉 Confirm Booking</button>
      <button class="cancel-btn" onclick="S.bookStep=3;render()">← Back</button>`;
  }
  return '';
}

function pickPatient(pid){
  const p=S.patients.find(x=>x.id===pid);
  if(!p)return;
  S.bookData.pid=p.id;S.bookData.pname=p.name;S.bookData.name=p.name;S.bookData.phone=p.phone;
  render();
  document.getElementById('b-name').value=p.name;
  document.getElementById('b-phone').value=p.phone;
}
function step0Next(){
  const name=document.getElementById('b-name')?.value.trim()||S.bookData.name;
  const phone=document.getElementById('b-phone')?.value.trim()||S.bookData.phone;
  if(!name){alert('Please enter the patient name');return}
  S.bookData.name=name;S.bookData.pname=name;S.bookData.phone=phone||'—';
  if(!S.bookData.pid){
    const existing=S.patients.find(p=>p.name.toLowerCase()===name.toLowerCase());
    if(existing){S.bookData.pid=existing.id;S.bookData.pname=existing.name}
  }
  S.bookStep=1;render();
}
function step1Next(){S.bookStep=2;render()}
function step2Next(){S.bookStep=3;render()}
function step3Next(){
  const txt=document.getElementById('b-symptoms')?.value.trim();
  if(txt)S.bookData.symptoms=txt;
  if(!S.bookData.symptoms){alert('Please enter the reason for visit');return}
  S.bookStep=4;render();
}
function confirmBook(){
  const d=S.bookData;
  if(!d.pid){const p={id:uid(),name:d.name,phone:d.phone,dob:'',blood:'',allergies:'',gender:''};S.patients.push(p);d.pid=p.id}
  const appt={id:uid(),pid:d.pid,pname:d.pname||d.name,date:d.date,time:d.time,symptoms:d.symptoms,status:'upcoming',notes:'',rx:[]};
  S.appointments.push(appt);
  S.bookSuccess=true;render();
}

  const done=S.appointments.filter(a=>a.status==='completed');
  const ok=S.followUps.filter(f=>f.resp==='yes').length;
  const rebook=S.followUps.filter(f=>f.resp==='no').length;
  return`
    <div class="stat-row mb20">

    </div>
    <div class="sec-title">Completed Visits</div>
    ${done.map(a=>{
      const fu=S.followUps.find(f=>f.aid===a.id);
      const wa=S.waMessages[a.id]||[];
      return`<div class="fu-card">
        <div class="fu-top">
          <div>

            <div class="fu-date">Visited ${fmtDate(a.date)}</div>

            :`<button class="sim-btn" style="width:auto;padding:7px 14px;margin:0" onclick="simFollowUp('${a.id}')" ${S.simRunning===a.id?'disabled':''}>

        </div>

            <div>
              <div class="wa-bubble ${m.from==='clinic'?'wa-clinic':'wa-patient'}">${esc(m.text)}</div>
              <div class="wa-time" style="text-align:${m.from==='clinic'?'left':'right'}">${m.from==='clinic'?'🏥 Clinic':'👤 Patient'}</div>
            </div>
          </div>`).join('')}
        </div>`:''}
        ${fu&&wa.length===0?`<div style="margin-top:8px"><div class="fu-note" style="background:var(--mint);color:#2d7a50">${esc(fu.note)}</div></div>`:''}
      </div>`;
    }).join('')}
    ${done.length===0?`<div class="empty"><div class="empty-icon">💬</div><div class="empty-text">No completed visits yet</div></div>`:''}`;
}

async function simFollowUp(aid){
  const a=S.appointments.find(x=>x.id===aid);
  if(!a||S.simRunning)return;
  S.simRunning=aid;S.waMessages={...S.waMessages,[aid]:[]};render();
  const add=(from,text)=>{S.waMessages={...S.waMessages,[aid]:[...(S.waMessages[aid]||[]),{from,text}]};render();};
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  await delay(600);add('clinic',`Hi ${a.pname.split(' ')[0]}! 👋 Hope you're feeling better after your visit.`);
  await delay(900);add('clinic',`${a.rx.length?'⏰ Please remember to take:\n'+a.rx.map(r=>`• ${r.name} — ${r.dose}`).join('\n'):'💊 Please take your medicines as advised.'}`);
  await delay(1000);add('clinic',`Are you feeling better?\nReply YES ✅ or NO ❌`);
  await delay(1400);
  const resp=Math.random()>0.4?'yes':'no';
  add('patient',resp==='yes'?'YES ✅ Much better, thank you!':'NO ❌ Still not feeling well');
  if(resp==='no'){await delay(700);add('clinic',`Sorry to hear that 😔 Please come back for a check-up.\n📞 Call us: +91 98200 00000`);}
  S.followUps.push({id:uid(),pid:a.pid,pname:a.pname,aid:a.id,sent:new Date().toISOString(),resp,note:resp==='yes'?'Patient doing well':'Patient needs rebooking'});
  S.simRunning=null;render();
}

/* ── Update modal ── */
function openUpdateModal(id){
  const a=S.appointments.find(x=>x.id===id);
  S.modalApptId=id;S.modalRx=[...a.rx];S.modalNotes=a.notes||'';
  renderModal();
}
function renderModal(){
  let existing=document.getElementById('modal-wrap');
  if(existing)existing.remove();
  if(!S.modalApptId)return;
  const a=S.appointments.find(x=>x.id===S.modalApptId);
  const el=document.createElement('div');
  el.id='modal-wrap';el.className='modal-wrap';
  el.innerHTML=`<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span>✏️ Update Visit</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="background:var(--sky);border-radius:var(--rs);padding:12px 14px;margin-bottom:16px;font-size:13px;font-weight:700;color:var(--sky3)">
      ${esc(a.pname)} · ${fmtDate(a.date)}
    </div>
    <label class="field-label">Doctor's Notes</label>
    <textarea class="field-input" id="modal-notes" placeholder="Write your notes…">${esc(S.modalNotes)}</textarea>
    <label class="field-label" style="margin-bottom:10px">Medicines Prescribed</label>
    ${S.modalRx.map((r,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div class="rx-item" style="flex:1;margin:0">
        <div class="rx-name">💊 ${esc(r.name)}</div>
        <div class="rx-detail">${esc(r.dose)} · ${esc(r.days)} days</div>
      </div>
      <button onclick="removeModalRx(${i})" style="width:32px;height:32px;border-radius:50%;border:1.5px solid var(--rose2);background:var(--rose);color:var(--rose3);font-size:16px;cursor:pointer;font-weight:700;flex-shrink:0">✕</button>
    </div>`).join('')}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <input class="field-input" id="rx-name" placeholder="Medicine name" style="margin-bottom:0"/>
      <input class="field-input" id="rx-dose" placeholder="Dosage" style="margin-bottom:0"/>
    </div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:16px">
      <input class="field-input" id="rx-days" placeholder="No. of days" type="number" style="margin-bottom:0"/>
      <button onclick="addModalRx()" style="padding:12px 20px;border-radius:var(--rs);border:none;background:var(--sky3);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif">+ Add</button>
    </div>
    <button class="submit-btn" onclick="saveModal()">✅ Save & Mark Complete</button>
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
  </div>`;
  document.body.appendChild(el);
}
function addModalRx(){
  const n=document.getElementById('rx-name')?.value.trim();
  if(!n)return;
  S.modalRx.push({name:n,dose:document.getElementById('rx-dose')?.value||'As directed',days:document.getElementById('rx-days')?.value||'7'});
  renderModal();
}
function removeModalRx(i){S.modalRx=S.modalRx.filter((_,idx)=>idx!==i);renderModal()}
function saveModal(){
  const a=S.appointments.find(x=>x.id===S.modalApptId);
  if(a){a.notes=document.getElementById('modal-notes')?.value||S.modalNotes;a.rx=S.modalRx;a.status='completed';}
  closeModal();render();
}
function closeModal(){S.modalApptId=null;const el=document.getElementById('modal-wrap');if(el)el.remove()}

/* ── Main render ── */
function render(){
  const titles={home:'Home',appointments:'Appointments',patients:'Patients',book:'Book Appointment',followup:'Follow-up'};
  let html='';
  switch(S.tab){
    case 'appointments': html=pageAppointments();break;
    case 'patients': html=pagePatients();break;
    case 'book': html=pageBook();break;
    case 'followup': html=pageFollowup();break;
    default: html=pageHome();
  }
  document.getElementById('page').innerHTML=html;
  renderNav();
  window.scrollTo(0,0);
}

document.getElementById('hdr-date').textContent=new Date('2026-04-03').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
render();
</script>
