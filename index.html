<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>MediFlow – Clinic Automation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;--bg2:#111827;--bg3:#1a2235;--bg4:#202b3d;--bg5:#243047;
  --accent:#3b82f6;--a2:#60a5fa;--green:#22c55e;--red:#ef4444;
  --amber:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;
  --text:#f1f5f9;--t2:#94a3b8;--t3:#64748b;
  --border:#1e2d42;--b2:#2a3d5a;
  --card:#131e30;--r:12px;--rs:8px;
  --bottom-nav-h:64px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden}
#root{height:100vh;display:flex}

/* ── Shell ── */
.shell{display:flex;width:100%;height:100vh;overflow:hidden}
.sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s}
.sidebar.col{width:66px}
.sb-logo{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-box{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:9px;display:grid;place-items:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 12px rgba(59,130,246,.35)}
.logo-txt{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;letter-spacing:-.3px}
.logo-txt span{color:var(--a2)}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:3px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:var(--rs);border:none;background:none;color:var(--t2);cursor:pointer;width:100%;text-align:left;font-size:13.5px;white-space:nowrap;overflow:hidden;transition:all .15s;position:relative}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.act{background:rgba(59,130,246,.15);color:var(--a2)}
.nav-btn.act::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.sb-foot{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.status-pill{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--bg3);border-radius:var(--rs);border:1px solid var(--border)}
.blink{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{opacity:.6;box-shadow:0 0 0 4px rgba(34,197,94,0)}}

/* ── Bottom Nav (Mobile) ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(var(--bottom-nav-h) + var(--safe-bottom));background:var(--bg2);border-top:1px solid var(--border);z-index:100;padding-bottom:var(--safe-bottom)}
.bottom-nav-inner{display:flex;height:var(--bottom-nav-h);align-items:stretch}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--t3);cursor:pointer;padding:8px 4px;transition:color .15s;-webkit-tap-highlight-color:transparent;min-width:0}
.bnav-btn.act{color:var(--a2)}
.bnav-btn.act .bnav-icon-wrap{background:rgba(59,130,246,.15);border-radius:8px}
.bnav-icon-wrap{padding:4px 12px;border-radius:8px;transition:.15s}
.bnav-icon{font-size:20px;line-height:1}
.bnav-label{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.pg-title{font-size:18px;font-weight:600;letter-spacing:-.3px}
.pg-sub{font-size:11px;color:var(--t3);margin-top:2px}
.topbar-r{display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

/* ── Buttons ── */
.btn{padding:7px 15px;border-radius:var(--rs);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;line-height:1}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#2563eb}
.btn-g{background:var(--bg3);color:var(--t2);border:1px solid var(--border)}.btn-g:hover{background:var(--bg4);color:var(--text)}
.btn-green{background:#15803d;color:#fff}.btn-green:hover{background:#166534}
.btn-sm{padding:5px 11px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ── Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.metric::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.c-blue::after{background:linear-gradient(90deg,var(--accent),transparent)}
.c-green::after{background:linear-gradient(90deg,var(--green),transparent)}
.c-amber::after{background:linear-gradient(90deg,var(--amber),transparent)}
.c-purple::after{background:linear-gradient(90deg,var(--purple),transparent)}
.mlabel{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.mval{font-size:24px;font-weight:700;line-height:1}
.msub{font-size:10px;color:var(--t3);margin-top:4px}
.c-blue .mval{color:var(--a2)}.c-green .mval{color:var(--green)}.c-amber .mval{color:var(--amber)}.c-purple .mval{color:var(--purple)}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--t3);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--t2)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.b-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.b-amber{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.2)}
.b-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.b-purple{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}
.b-teal{background:rgba(20,184,166,.12);color:#2dd4bf;border:1px solid rgba(20,184,166,.2)}

/* ── Forms ── */
.fg{margin-bottom:14px}
.flabel{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;color:var(--text);font-size:14px;outline:none;transition:border .15s}
.finput:focus{border-color:var(--accent)}
textarea.finput{resize:vertical;min-height:80px;line-height:1.5}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;z-index:300;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.5)}
.modal-hdr{font-size:17px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
/* Desktop modal */
@media(min-width:640px){
  .overlay{align-items:center}
  .modal{border-radius:var(--r);max-height:88vh;width:580px}
}

/* ── Avatar ── */
.av{border-radius:50%;display:grid;place-items:center;font-weight:700;flex-shrink:0}

/* ── Tags ── */
.tag{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--bg4);color:var(--t3);border:1px solid var(--border)}

/* ── Bar Chart ── */
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:120px;padding:0 2px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--a2),var(--accent));min-width:16px;position:relative;cursor:default}
.bar:hover{opacity:.85}
.bar-lbl{font-size:9px;color:var(--t3)}
.bar-v{font-size:9px;color:var(--t2)}

/* ────────────────────────────────────────────
   CHAT STYLES
──────────────────────────────────────────── */
.chat-page{display:flex;height:calc(100vh - 65px);overflow:hidden}
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--border)}
.chat-hdr{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-hdr-l{display:flex;align-items:center;gap:10px}
.ai-ring{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:grid;place-items:center;font-size:18px;flex-shrink:0;position:relative}
.ai-ring::after{content:'';position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:var(--green);border-radius:50%;border:2px solid var(--bg2)}
.chat-name{font-weight:600;font-size:14px}
.chat-status{font-size:11px;color:var(--t3);margin-top:1px}
.mode-tabs{display:flex;gap:5px}
.mode-tab{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--t2);font-size:12px;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.mode-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.msgs-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--bg);-webkit-overflow-scrolling:touch}
.msg-row{display:flex;gap:8px;max-width:90%}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:13px;flex-shrink:0;align-self:flex-end}
.msg-av.ai{background:linear-gradient(135deg,var(--accent),var(--purple))}
.msg-av.user{background:var(--bg4);border:1px solid var(--b2)}
.msg-body{display:flex;flex-direction:column;gap:4px}
.msg-row.user .msg-body{align-items:flex-end}
.bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word}
.bubble.ai{background:var(--bg3);color:var(--text);border-radius:4px 16px 16px 16px;border:1px solid var(--border)}
.bubble.user{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;border-radius:16px 4px 16px 16px}
.msg-time{font-size:10px;color:var(--t3)}
.rich-card{background:var(--bg4);border:1px solid var(--b2);border-radius:var(--rs);padding:12px 14px;margin-top:8px;font-size:13px}
.rich-card-title{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:8px;font-weight:500}
.rich-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.rich-row:last-child{border-bottom:none}
.rich-label{color:var(--t2)}
.rich-val{color:var(--text);font-weight:500}
.patient-card-mini{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.patient-card-mini:last-child{border-bottom:none}
.appt-card{background:var(--bg5);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--accent)}
.appt-card.comp{border-left-color:var(--green)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.stat-box{background:var(--bg5);border-radius:6px;padding:8px 10px;text-align:center}
.stat-n{font-size:20px;font-weight:700}
.stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;margin-top:2px}
.typing-row{display:flex;gap:10px;align-items:center}
.typing-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:4px 16px 16px 16px;padding:12px 16px;display:flex;gap:5px}
.tdot{width:7px;height:7px;background:var(--t3);border-radius:50%;animation:td .7s ease infinite}
.tdot:nth-child(2){animation-delay:.15s}.tdot:nth-child(3){animation-delay:.3s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.6}30%{transform:translateY(-5px);opacity:1}}
.chat-input-bar{padding:12px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-textarea{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.5;transition:border .15s;font-family:inherit}
.chat-textarea:focus{border-color:var(--accent)}
.send-btn{width:40px;height:40px;border-radius:var(--rs);background:var(--accent);border:none;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:.15s;-webkit-tap-highlight-color:transparent}
.send-btn:hover{background:#2563eb}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-icon{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ctx-panel{width:260px;background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.ctx-section{padding:14px;border-bottom:1px solid var(--border)}
.ctx-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:8px;font-weight:500}
.quick-btn{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg3);color:var(--t2);font-size:12px;cursor:pointer;margin-bottom:4px;transition:.15s;line-height:1.4;-webkit-tap-highlight-color:transparent}
.quick-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--b2)}
.booked-box{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:var(--rs);padding:10px}
.booked-title{color:var(--green);font-weight:600;font-size:13px;margin-bottom:8px}
.booked-row{display:flex;gap:6px;align-items:flex-start;font-size:12px;color:var(--t2);margin-bottom:4px}

/* ── WA sim ── */
.wa-wrap{background:#060d1a;border-radius:var(--rs);padding:10px;max-height:200px;overflow-y:auto;margin-top:8px;border:1px solid #0d1f30}
.wa-msg{display:flex;margin-bottom:7px}
.wa-msg.r{justify-content:flex-end}
.wa-b{border-radius:8px;padding:8px 11px;max-width:84%;font-size:12px;line-height:1.5;white-space:pre-wrap}
.wa-cli{background:#1a3a2a;border:1px solid #2a5a3a;color:#86efac}
.wa-pat{background:#1a2a4a;border:1px solid #1e3a6e;color:#93c5fd}
.wa-t{font-size:9px;color:var(--t3);text-align:right;margin-top:3px}

/* ── Misc ── */
.section-t{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text)}
.divider{height:1px;background:var(--border);margin:14px 0}
.empty{text-align:center;padding:32px;color:var(--t3);font-size:14px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

/* ══════════════════════════════════════════════
   RESPONSIVE — Tablet (≤900px): Collapse sidebar
══════════════════════════════════════════════ */
@media(max-width:900px){
  .sidebar{width:60px}
  .sidebar .logo-txt,.sidebar .sb-foot .status-pill span,
  .sidebar .nav-btn span:not(.nav-icon),.sidebar .sb-foot button{display:none}
  .ctx-panel{display:none}
}

/* ══════════════════════════════════════════════
   RESPONSIVE — Mobile (≤640px): Hide sidebar, show bottom nav
══════════════════════════════════════════════ */
@media(max-width:640px){
  .sidebar{display:none}
  .bottom-nav{display:flex;flex-direction:column}
  .main{height:calc(100vh - var(--bottom-nav-h) - var(--safe-bottom))}
  .content{padding:12px}
  .topbar{padding:12px}
  .pg-title{font-size:16px}

  /* Metrics: 2-column on mobile */
  .metrics{grid-template-columns:1fr 1fr;gap:8px}
  .mval{font-size:20px}

  /* Grid 2: stack on mobile */
  .grid2{grid-template-columns:1fr}

  /* Hide some table columns on mobile */
  .hide-mobile{display:none}

  /* Chat: fill full width, no right panel */
  .chat-page{height:calc(100vh - 65px - var(--bottom-nav-h) - var(--safe-bottom))}
  .chat-panel{border-right:none}
  .msg-row{max-width:95%}
  .mode-tab{padding:5px 10px;font-size:11px}

  /* Patient grid: single column */
  .pat-grid{grid-template-columns:1fr!important}

  /* Follow-up grid: single col */
  .fu-grid{grid-template-columns:1fr!important}

  /* Modal: full-width sheet */
  .modal{padding:16px}
  .modal .grid-rx{grid-template-columns:1fr 1fr!important}
}

/* ══════════════════════════════════════════════
   RESPONSIVE — Small mobile (≤380px)
══════════════════════════════════════════════ */
@media(max-width:380px){
  .metrics{grid-template-columns:1fr 1fr}
  .mval{font-size:18px}
  .bnav-label{display:none}
  .bnav-icon{font-size:22px}
}
</style>
</head>

const COLORS=['#3b82f6','#8b5cf6','#ec4899','#22c55e','#f59e0b','#06b6d4','#f97316'];
function avc(n){let h=0;for(let c of(n||''))h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h]}
function ini(n){return(n||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()||'?'}
function fd(d){if(!d)return'—';try{return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}catch{return d}}
function ft(t){if(!t)return'';const[h,m]=t.split(':');const hr=parseInt(h);return`${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`}
function uid(){return 'x'+Date.now()+Math.random().toString(36).slice(2,5)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function now(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}
function isMobile(){return window.innerWidth<=640}

const INTENTS = {
  SHOW_PATIENTS:      /\b(patients?|all patients?|list patients?|show patients?|patient list)\b/i,
  SHOW_APPOINTMENTS:  /\b(appointments?|all appointments?|show appointments?|schedule|calendar)\b/i,
  UPCOMING:           /\b(upcoming|today|tomorrow|next|scheduled)\b.*\b(appointments?|patients?|visits?)\b|\bwho.*coming\b|\bwho.*today\b/i,
  COMPLETED:          /\b(completed?|done|finished|past|previous)\b.*\b(appointments?|visits?)\b/i,
  FOLLOWUP_STATUS:    /\b(follow.?up|followup|whatsapp|pending|sent)\b/i,
  ANALYTICS:          /\b(stats?|analytics?|report|summary|overview|numbers?|metrics?|performance)\b/i,
  PATIENT_LOOKUP:     /\b(tell me about|show me|lookup|find|search|who is|patient named?|info (on|about))\b/i,
  REBOOK:             /\b(rebook|re.book|rebooking|needs? rebooking)\b/i,
  MEDICINE:           /\b(medicine|medication|prescription|rx|drug|dose)\b/i,
  GREETING:           /^(hi|hello|hey|good morning|good afternoon|namaste|hii+|howdy)[\s!?.]*$/i,
  HELP:               /\b(help|what can you do|commands?|options?)\b/i,
};

function detectIntent(msg) {
  for (const [intent, regex] of Object.entries(INTENTS)) {
    if (regex.test(msg)) return intent;
  }
  for (const p of S.patients) {
    const parts = p.name.toLowerCase().split(' ');
    if (parts.some(part => msg.toLowerCase().includes(part))) return 'NAMED_PATIENT';
  }
  return 'UNKNOWN';
}

function findPatientByMsg(msg) {
  const lower = msg.toLowerCase();
  return S.patients.find(p =>
    p.name.toLowerCase().split(' ').some(w => w.length > 2 && lower.includes(w))
  );
}

function generateDoctorResponse(msg) {
  const intent = detectIntent(msg);
  switch (intent) {
    case 'GREETING':
      return { text: `Hello Doctor! 👋 I'm MedAssist, your AI assistant.\n\nI have access to ${S.patients.length} patients, ${S.appointments.length} appointments, and ${S.followUps.length} follow-up records.\n\nWhat would you like to know?`, rich: null };
    case 'HELP':
      return { text: `Here's what I can help you with:`, rich: {type:'help',items:['📋 "Show all patients"','📅 "Upcoming appointments"','✅ "Completed appointments"','👤 "Tell me about Arjun Mehta"','💊 "Prescriptions for Priya"','📊 "Show analytics"','📱 "Follow-up status"','🔄 "Who needs rebooking?"']}};
    case 'SHOW_PATIENTS':
      return { text: `All ${S.patients.length} registered patients:`, rich: {type:'patients', data:S.patients}};
    case 'UPCOMING': {
      const up = S.appointments.filter(a=>a.status==='upcoming').sort((a,b)=>new Date(a.date)-new Date(b.date));
      return { text: `${up.length} upcoming appointment${up.length!==1?'s':''} scheduled:`, rich: {type:'appointments', data:up, badge:'upcoming'}};
    }
    case 'COMPLETED': {
      const comp = S.appointments.filter(a=>a.status==='completed').sort((a,b)=>new Date(b.date)-new Date(a.date));
      return { text: `${comp.length} completed appointment${comp.length!==1?'s':''}:`, rich: {type:'appointments', data:comp, badge:'completed'}};
    }
    case 'SHOW_APPOINTMENTS': {
      const all = [...S.appointments].sort((a,b)=>new Date(b.date)-new Date(a.date));
      return { text: `All ${all.length} appointments:`, rich: {type:'appointments', data:all, badge:'all'}};
    }
    case 'FOLLOWUP_STATUS': {
      const sent = S.followUps.length, ok = S.followUps.filter(f=>f.resp==='yes').length, rebook = S.followUps.filter(f=>f.resp==='no').length;
      const pending = S.appointments.filter(a=>a.status==='completed'&&!S.followUps.find(f=>f.aid===a.id));
      return { text: `Follow-up report:`, rich: {type:'followups', data:S.followUps, sent, ok, rebook, pending:pending.length}};
    }
    case 'ANALYTICS': {
      const total=S.appointments.length, comp=S.appointments.filter(a=>a.status==='completed').length, up=S.appointments.filter(a=>a.status==='upcoming').length;
      const adhere=S.followUps.length?Math.round(S.followUps.filter(f=>f.adhere).length/S.followUps.length*100):0;
      return { text:`Clinic overview:`, rich:{type:'analytics',total,comp,up,adhere,patients:S.patients.length,followUps:S.followUps.length}};
    }
    case 'REBOOK': {
      const toRebook = S.followUps.filter(f=>f.resp==='no').map(f=>({...f,appt:S.appointments.find(a=>a.id===f.aid),pat:S.patients.find(p=>p.id===f.pid)}));
      return { text:`${toRebook.length} patient${toRebook.length!==1?'s':''} need rebooking:`, rich:{type:'rebook',data:toRebook}};
    }
    case 'NAMED_PATIENT':
    case 'PATIENT_LOOKUP': {
      const pat = findPatientByMsg(msg);
      if (!pat) return { text:`Patient not found. Try "show all patients".`, rich:null};
      const appts = S.appointments.filter(a=>a.pid===pat.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
      const fus = S.followUps.filter(f=>f.pid===pat.id);
      return { text:`Profile for **${pat.name}**:`, rich:{type:'patient_profile',pat,appts,fus}};
    }
    case 'MEDICINE': {
      const pat = findPatientByMsg(msg);
      if (pat) {
        const appts = S.appointments.filter(a=>a.pid===pat.id&&a.rx.length>0);
        return { text:`Prescriptions for **${pat.name}**:`, rich:{type:'prescriptions',pat,appts}};
      }
      const withRx = S.appointments.filter(a=>a.rx.length>0);
      return { text:`Prescriptions across ${withRx.length} appointments:`, rich:{type:'prescriptions',appts:withRx}};
    }
    default:
      const maybePat = findPatientByMsg(msg);
      if (maybePat) {
        const appts=S.appointments.filter(a=>a.pid===maybePat.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
        const fus=S.followUps.filter(f=>f.pid===maybePat.id);
        return {text:`Found **${maybePat.name}**:`,rich:{type:'patient_profile',pat:maybePat,appts,fus}};
      }
      return { text:`I didn't understand that. Try:\n• "Show upcoming appointments"\n• "Tell me about [patient name]"\n• "Show analytics"`, rich:null};
  }
}

function handleBookingMsg(msg) {
  const c = S._collect;
  const lower = msg.toLowerCase().trim();
  if (lower==='reset'||lower==='start over'||lower==='restart') {
    S._collect={};
    return {text:`Let's start fresh. Could you tell me your **full name**?`,rich:null};
  }
  if (!c.name) {
    if (INTENTS.GREETING.test(lower)) {
      return {text:`Hi there! 👋 I'm Medi, your AI appointment assistant at City Care Clinic.\n\nCould you share your **full name** to get started?`,rich:null};
    }
    if (lower.includes('?')||lower.length<2) {
      return {text:`Let me first get your name. What's your **full name** please?`,rich:null};
    }
    const existing = S.patients.find(p=>p.name.toLowerCase().includes(lower)||lower.includes(p.name.toLowerCase().split(' ')[0].toLowerCase()));
    if (existing) {
      c.name = existing.name; c.pid = existing.id; c.phone = existing.phone;
      return {text:`Welcome back, **${existing.name}**! 😊 Found your records.\n\nYour registered number is ${existing.phone} — use this, or a different one?`,rich:{type:'patient_mini',pat:existing}};
    }
    c.name = msg.trim();
    return {text:`Nice to meet you, **${c.name}**! 😊\n\nCould you share your **phone number**?`,rich:null};
  }
  if (c.name && c.phone && !c.phoneConfirmed) {
    if (lower.includes('yes')||lower.includes('use this')||lower.includes('same')||lower.includes('correct')) {
      c.phoneConfirmed = true;
      return {text:`Great! What **date** would you prefer?\n\n📅 Open Mon–Sat, 9 AM – 6 PM.`,rich:null};
    } else if (msg.match(/\d{5,}/)) {
      c.phone = msg.replace(/[^\d+]/g,''); c.phoneConfirmed = true;
      return {text:`Updated to **${c.phone}**.\n\nWhat **date** works for you?`,rich:null};
    }
    return {text:`Use **${c.phone}** for this appointment? (Yes / share different number)`,rich:null};
  }
  if (!c.phone) {
    const phoneMatch = msg.match(/[\d\s\-+()]{8,}/);
    if (!phoneMatch) return {text:`Could you share your **10-digit mobile number**? 📱`,rich:null};
    c.phone = msg.trim(); c.phoneConfirmed = true;
    return {text:`Saved **${c.phone}**. ✅\n\nWhat **date** would you prefer?\n\n📅 Open Mon–Sat, 9 AM – 6 PM.`,rich:null};
  }
  if (!c.date) {
    const dateMap = {'today':'2026-04-02','tomorrow':'2026-04-03','day after':'2026-04-04','monday':'2026-04-06','tuesday':'2026-04-07','wednesday':'2026-04-08','thursday':'2026-04-09','friday':'2026-04-10','saturday':'2026-04-11'};
    for (const [k,v] of Object.entries(dateMap)) { if (lower.includes(k)){c.date=v;break} }
    if (!c.date) {
      const m=msg.match(/april\s*(\d+)/i)||msg.match(/(\d{1,2})[\/\-](\d{1,2})/);
      if(m)c.date=`2026-04-${String(m[1]).padStart(2,'0')}`;
    }
    if (!c.date) return {text:`Mention the date like:\n• "April 7" · "This Friday" · "Next Monday"`,rich:null};
    return {text:`**${fd(c.date)}** noted! ✅\n\nWhat **time** works for you?`,rich:{type:'time_slots'}};
  }
  if (!c.time) {
    const timeMap={'9':['09:00','9 am','9am','nine'],'10':['10:00','10 am','10am','ten'],'11':['11:00','11 am','11am','eleven'],'12':['12:00','12 pm','noon'],'14':['2 pm','2pm','14:00'],'15':['3 pm','3pm','15:00'],'16':['4 pm','4pm','16:00'],'17':['5 pm','5pm','17:00']};
    for(const[hr,aliases] of Object.entries(timeMap)){
      if(aliases.some(a=>lower.includes(a))||lower.includes(hr+':')){c.time=hr.padStart(2,'0')+':00';break;}
    }
    if(lower.includes('morning'))c.time='10:00';
    if(lower.includes('afternoon'))c.time='14:00';
    if(lower.includes('evening'))c.time='17:00';
    if(!c.time) return {text:`Which time?\n• Morning: 9 AM, 10 AM, 11 AM\n• Afternoon: 12 PM, 2 PM, 3 PM\n• Evening: 4 PM, 5 PM`,rich:null};
    return {text:`**${ft(c.time)}** on **${fd(c.date)}** is available! ✅\n\nLastly, what's the **reason for your visit**?`,rich:null};
  }
  if (!c.symptoms) {
    if (lower.length < 3) return {text:`Briefly describe your **symptoms or reason** (e.g. fever, checkup, back pain)?`,rich:null};
    c.symptoms = msg.trim();
    return {text:`Here's your appointment summary:`,rich:{type:'booking_confirm',name:c.name,phone:c.phone,date:c.date,time:c.time,symptoms:c.symptoms,isNew:!c.pid}};
  }
  if (c.symptoms && !c.confirmed) {
    if (lower.includes('yes')||lower.includes('confirm')||lower.includes('correct')||lower.includes('ok')||lower==='y') {
      const newPat = c.pid ? null : {id:uid(),name:c.name,phone:c.phone,dob:'',blood:'',allergies:'',gender:''};
      if(newPat) S.patients.push(newPat);
      const newAppt = {id:uid(),pid:c.pid||newPat.id,pname:c.name,date:c.date,time:c.time,symptoms:c.symptoms,status:'upcoming',notes:'',rx:[]};
      S.appointments.push(newAppt);
      S.booked={...newAppt};
      S._collect={};
      return {text:`🎉 Appointment **confirmed**!`,rich:{type:'booking_done',appt:newAppt}};
    }
    if (lower.includes('no')||lower.includes('change')||lower.includes('wrong')) {
      S._collect={};
      return {text:`No problem! Let's start over. What's your **name**?`,rich:null};
    }
    return {text:`Reply **YES** to confirm or **NO** to start over.`,rich:null};
  }
  S._collect={};
  return {text:`Your appointment is booked! 😊\n\nType "book" to make another appointment.`,rich:null};
}

/* ── Chat actions ── */
function confirmBookingFromBtn(){addUserMsg('Yes, confirm my appointment');processChat('Yes, confirm my appointment')}
function cancelBookingFromBtn(){S._collect={};addUserMsg('No, start over');processChat('No, start over')}
function setTimeFromSlot(t){const msg=`I'd prefer ${t}`;addUserMsg(msg);processChat(msg)}

function addUserMsg(text){S.chatHistory.push({role:'user',content:text,time:now()});renderChat();scrollChat()}
function addAIMsg(text,rich){S.chatHistory.push({role:'assistant',content:text,time:now(),richData:rich});S.chatBusy=false;renderChat();scrollChat()}
function scrollChat(){setTimeout(()=>{const el=document.getElementById('msgs-area');if(el)el.scrollTop=el.scrollHeight},30)}

function renderChat(){
  const area=document.getElementById('msgs-area');
  if(!area)return;
  area.innerHTML=buildMsgs();
}

function switchMode(m){S.chatMode=m;S.chatHistory=[];S.booked=null;S._collect={};renderPage()}

function processChat(text){
  if(S.chatMode==='doctor'){
    const {text:t,rich}=generateDoctorResponse(text);addAIMsg(t,rich);
  } else {
    const {text:t,rich}=handleBookingMsg(text);addAIMsg(t,rich);
  }
}

async function sendMsg(){
  const inp=document.getElementById('chat-inp');
  if(!inp)return;
  const text=inp.value.trim();
  if(!text||S.chatBusy)return;
  inp.value='';inp.style.height='auto';
  S.chatBusy=true;
  addUserMsg(text);
  const area=document.getElementById('msgs-area');
  if(area){
    const typEl=document.createElement('div');
    typEl.id='typing-row';typEl.className='typing-row';
    typEl.innerHTML=`<div class="ai-ring msg-av ai" style="width:30px;height:30px;font-size:13px">🤖</div><div class="typing-bubble"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
    area.appendChild(typEl);scrollChat();
  }
  await new Promise(r=>setTimeout(r,600+Math.random()*400));
  const typEl=document.getElementById('typing-row');if(typEl)typEl.remove();
  processChat(text);
}

function buildMsgs(){
  const mode=S.chatMode;
  if(S.chatHistory.length===0){
    const greeting=mode==='doctor'
      ?`Hello, Doctor! 👨‍⚕️ I'm <b>MedAssist</b>.<br><br>Ask me about patients, appointments, prescriptions, or analytics.`
      :`Hi! 👋 I'm <b>Medi</b>, your appointment assistant.<br><br>To get started, tell me your <b>full name</b>.`;
    return `<div class="msg-row"><div class="ai-ring msg-av ai" style="width:30px;height:30px;font-size:13px">${mode==='doctor'?'👨‍⚕️':'🤖'}</div>
      <div class="msg-body"><div class="bubble ai">${greeting}</div><div class="msg-time">${now()}</div></div></div>`;
  }
  return S.chatHistory.map(m=>{
    const isUser=m.role==='user';
    const text=m.content.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    if(isUser)return `<div class="msg-row user">
      <div class="msg-av user" style="font-size:13px">👤</div>
      <div class="msg-body"><div class="bubble user">${esc(m.content)}</div><div class="msg-time">${m.time}</div></div></div>`;
    return `<div class="msg-row">
      <div class="ai-ring msg-av ai" style="width:30px;height:30px;font-size:13px">${S.chatMode==='doctor'?'👨‍⚕️':'🤖'}</div>
      <div class="msg-body"><div class="bubble ai">${text}</div>${m.richData?renderRich(m.richData):''}<div class="msg-time">${m.time}</div></div></div>`;
  }).join('');
}

function buildBookingCtx(){
  const mode=S.chatMode;
  const quickPrompts=mode==='booking'

        const fu=S.followUps.find(f=>f.aid===a.id), wa=S.waMessages[a.id]||[];
        return`<div class="card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div>
              <div style="font-weight:600">${esc(a.pname)}</div>
              <div style="font-size:11px;color:var(--t3);margin-top:2px">${fd(a.date)} · ${esc(a.symptoms)}</div>
            </div>
            ${fu?`<span class="badge ${fu.resp==='yes'?'b-green':'b-amber'}">${fu.resp==='yes'?'✓ Well':'⚠ Rebooked'}</span>`
              :`<button class="btn btn-p btn-sm" onclick="simFollowUp('${a.id}')" ${S.simulating===a.id?'disabled':''}>▶ Simulate</button>`}
          </div>
          ${wa.length?`<div class="wa-wrap" id="wa-${a.id}">
            <div style="font-size:10px;color:var(--t3);text-align:center;margin-bottom:6px">📱 WHATSAPP SIMULATION</div>
            ${wa.map(m=>`<div class="wa-msg ${m.from==='patient'?'r':''}">
              <div class="wa-b ${m.from==='clinic'?'wa-cli':'wa-pat'}">${esc(m.text)}<div class="wa-t">${m.from==='clinic'?'🏥 Clinic':'👤 Patient'}</div></div>
            </div>`).join('')}
          </div>`:''}
          ${fu&&wa.length===0?`<div style="font-size:12px;color:var(--t3);background:var(--bg3);border-radius:var(--rs);padding:8px;border:1px solid var(--border)">${esc(fu.note)}</div>`:''}
          ${a.rx.length?`<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">${a.rx.map(r=>`<span class="tag">💊 ${esc(r.name)}</span>`).join('')}</div>`:''}
        </div>`;
      }).join('')}
      ${done.length===0?'<div class="empty">No completed appointments yet</div>':''}
    </div>
  </div>`;
}

/* ── Modal actions ── */
function openModal(id){S.modalAppt=S.appointments.find(a=>a.id===id);S.modalRx=[...(S.modalAppt?.rx||[])];S.modalNotes=S.modalAppt?.notes||'';renderPage()}
function closeModal(){S.modalAppt=null;renderPage()}
function addRx(){
  const n=document.getElementById('rx-name')?.value?.trim();
  if(!n)return;
  S.modalRx=[...S.modalRx,{name:n,dose:document.getElementById('rx-dose')?.value||'',days:document.getElementById('rx-days')?.value||''}];
  renderPage();
}
function removeRx(i){S.modalRx=S.modalRx.filter((_,idx)=>idx!==i);renderPage()}
function saveAppt(){
  const a=S.appointments.find(x=>x.id===S.modalAppt.id);
  if(a){a.notes=S.modalNotes||document.getElementById('modal-notes')?.value||'';a.rx=S.modalRx;a.status='completed';}
  closeModal();
}
async function aiSuggest(){
  const btn=event.target;btn.textContent='⟳…';btn.disabled=true;
  const a=S.modalAppt;
  await new Promise(r=>setTimeout(r,800));
  const symLow=(a.symptoms||'').toLowerCase();
  let notes='',meds=[];
  if(symLow.includes('fever')||symLow.includes('headache')){notes='Viral infection likely. Monitor hydration.';meds=[{name:'Paracetamol 650mg',dose:'Every 6 hours',days:5},{name:'ORS Sachets',dose:'2-3 daily',days:3}];}
  else if(symLow.includes('back')||symLow.includes('pain')){notes='Musculoskeletal. Rest & physiotherapy recommended.';meds=[{name:'Ibuprofen 400mg',dose:'Twice daily after meals',days:5}];}
  else if(symLow.includes('cough')||symLow.includes('cold')){notes='Viral URTI suspected. Symptomatic management.';meds=[{name:'Cetirizine 10mg',dose:'Once at night',days:5}];}
  else{notes='Clinical assessment required.';meds=[{name:'Paracetamol 500mg',dose:'As needed',days:3}];}
  S.modalNotes=notes+' [AI-suggested — review]';S.modalRx=meds;
  renderPage();
}

/* ── WhatsApp simulation ── */
async function simFollowUp(aid){
  const a=S.appointments.find(x=>x.id===aid);
  if(!a||S.simulating)return;
  S.simulating=aid;S.waMessages={...S.waMessages,[aid]:[]};renderPage();
  const add=(from,text)=>{S.waMessages={...S.waMessages,[aid]:[...(S.waMessages[aid]||[]),{from,text}]};renderPage();const el=document.getElementById('wa-'+aid);if(el)el.scrollTop=el.scrollHeight};
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  await delay(700);add('clinic',`Hi ${a.pname.split(' ')[0]}! 👋 Hope you're recovering after your visit on ${fd(a.date)}.`);
  await delay(900);add('clinic',`⏰ Medicine Reminder:\n${a.rx.map(r=>`• ${r.name} — ${r.dose}`).join('\n')||'Take your medicines as prescribed.'}`);
  await delay(900);add('clinic',`Feeling better?\n✅ Reply YES — Feeling okay\n❌ Reply NO — Still unwell`);
  await delay(1400);
  const resp=Math.random()>0.4?'yes':'no';
  add('patient',resp==='yes'?'YES ✅ Feeling much better!':'NO ❌ Still having discomfort');
  if(resp==='no'){await delay(800);add('clinic',`Sorry to hear that 😔\n\n🔗 Book follow-up: citycareclinic.com/book\n📞 +91 98200 00000`);}
  S.followUps=[...S.followUps,{id:uid(),pid:a.pid,pname:a.pname,aid:a.id,sent:new Date().toISOString(),resp,adhere:resp==='yes',note:resp==='yes'?'Patient doing well':'Rebook triggered'}];
  S.simulating=null;renderPage();
}

/* ── Main render ── */
function renderPage(){
  const col=S.collapsed;
  const nav=[{id:'dashboard',i:'📊',l:'Dashboard'},{id:'appointments',i:'📅',l:'Appointments'},{id:'patients',i:'👥',l:'Patients'},{id:'booking',i:'🤖',l:'AI Chat'},{id:'followup',i:'💬',l:'Follow-Ups'}];
  let pageHtml;
  switch(S.page){
    case 'appointments': pageHtml=buildAppointments();break;
    case 'patients': pageHtml=buildPatients();break;
    case 'booking': pageHtml=buildChat();break;
    case 'followup': pageHtml=buildFollowUp();break;
    default: pageHtml=buildDashboard();
  }
  document.getElementById('root').innerHTML=`<div class="shell">
    <aside class="sidebar ${col?'col':''}">
      <div class="sb-logo">
        <div class="logo-box">+</div>
        ${col?'':'<div class="logo-txt"><span>Medi</span>Flow</div>'}
      </div>
      <nav class="sb-nav">
        ${nav.map(n=>`<button class="nav-btn ${S.page===n.id?'act':''}" onclick="S.page='${n.id}';S.selPat=null;renderPage()">
          <span class="nav-icon">${n.i}</span>${col?'':'<span>'+n.l+'</span>'}
        </button>`).join('')}
      </nav>
      <div class="sb-foot">
        <div class="status-pill"><div class="blink"></div>${col?'':'<span style="font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden">City Care Clinic</span>'}</div>
        <button style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:6px;color:var(--t2);cursor:pointer;font-size:11px;transition:.15s;text-align:center" onclick="S.collapsed=!S.collapsed;renderPage()">${col?'→':'←'}</button>
      </div>
    </aside>
    <div class="main">${pageHtml}</div>
  </div>
  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      ${nav.map(n=>`<button class="bnav-btn ${S.page===n.id?'act':''}" onclick="S.page='${n.id}';S.selPat=null;renderPage()">
        <div class="bnav-icon-wrap"><div class="bnav-icon">${n.i}</div></div>
        <div class="bnav-label">${n.l}</div>
      </button>`).join('')}
    </div>
  </nav>`;

  if(S.page==='booking'){setTimeout(()=>{const el=document.getElementById('chat-inp');if(el)el.focus()},50)}
}

renderPage();
</script>
</body>
</html>
