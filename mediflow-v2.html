<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MediFlow – Clinic Automation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;--bg2:#111827;--bg3:#1a2235;--bg4:#202b3d;--bg5:#243047;
  --accent:#3b82f6;--a2:#60a5fa;--green:#22c55e;--red:#ef4444;
  --amber:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;
  --text:#f1f5f9;--t2:#94a3b8;--t3:#64748b;
  --border:#1e2d42;--b2:#2a3d5a;
  --card:#131e30;--r:12px;--rs:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden}
#root{height:100vh;display:flex}

/* ── Shell ── */
.shell{display:flex;width:100%;height:100vh;overflow:hidden}
.sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s}
.sidebar.col{width:66px}
.sb-logo{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-box{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:9px;display:grid;place-items:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 12px rgba(59,130,246,.35)}
.logo-txt{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;letter-spacing:-.3px}
.logo-txt span{color:var(--a2)}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:3px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:var(--rs);border:none;background:none;color:var(--t2);cursor:pointer;width:100%;text-align:left;font-size:13.5px;white-space:nowrap;overflow:hidden;transition:all .15s;position:relative}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.act{background:rgba(59,130,246,.15);color:var(--a2)}
.nav-btn.act::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.sb-foot{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.status-pill{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--bg3);border-radius:var(--rs);border:1px solid var(--border)}
.blink{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{opacity:.6;box-shadow:0 0 0 4px rgba(34,197,94,0)}}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pg-title{font-size:20px;font-weight:600;letter-spacing:-.3px}
.pg-sub{font-size:12px;color:var(--t3);margin-top:2px}
.topbar-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.content{flex:1;overflow-y:auto;padding:22px}

/* ── Buttons ── */
.btn{padding:7px 15px;border-radius:var(--rs);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;line-height:1}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#2563eb}
.btn-g{background:var(--bg3);color:var(--t2);border:1px solid var(--border)}.btn-g:hover{background:var(--bg4);color:var(--text)}
.btn-green{background:#15803d;color:#fff}.btn-green:hover{background:#166534}
.btn-sm{padding:5px 11px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ── Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.metric::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.c-blue::after{background:linear-gradient(90deg,var(--accent),transparent)}
.c-green::after{background:linear-gradient(90deg,var(--green),transparent)}
.c-amber::after{background:linear-gradient(90deg,var(--amber),transparent)}
.c-purple::after{background:linear-gradient(90deg,var(--purple),transparent)}
.mlabel{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.mval{font-size:28px;font-weight:700;line-height:1}
.msub{font-size:11px;color:var(--t3);margin-top:5px}
.c-blue .mval{color:var(--a2)}.c-green .mval{color:var(--green)}.c-amber .mval{color:var(--amber)}.c-purple .mval{color:var(--purple)}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;color:var(--t3);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--t2)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.b-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.b-amber{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.2)}
.b-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.b-purple{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}
.b-teal{background:rgba(20,184,166,.12);color:#2dd4bf;border:1px solid rgba(20,184,166,.2)}

/* ── Forms ── */
.fg{margin-bottom:14px}
.flabel{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;color:var(--text);font-size:14px;outline:none;transition:border .15s}
.finput:focus{border-color:var(--accent)}
textarea.finput{resize:vertical;min-height:80px;line-height:1.5}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:24px;width:580px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-hdr{font-size:17px;font-weight:600;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}

/* ── Avatar ── */
.av{border-radius:50%;display:grid;place-items:center;font-weight:700;flex-shrink:0}

/* ── Tags ── */
.tag{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--bg4);color:var(--t3);border:1px solid var(--border)}

/* ── Bar Chart ── */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:140px;padding:0 2px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:5px}
.bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--a2),var(--accent));min-width:24px;position:relative;cursor:default}
.bar:hover{opacity:.85}
.bar-lbl{font-size:10px;color:var(--t3)}
.bar-v{font-size:10px;color:var(--t2)}

/* ─────────────────────────────────────────────
   CHAT STYLES  
───────────────────────────────────────────── */
.chat-page{display:flex;height:calc(100vh - 65px);overflow:hidden}

/* Left: chat panel */
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--border)}
.chat-hdr{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-hdr-l{display:flex;align-items:center;gap:10px}
.ai-ring{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:grid;place-items:center;font-size:18px;flex-shrink:0;position:relative}
.ai-ring::after{content:'';position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:var(--green);border-radius:50%;border:2px solid var(--bg2)}
.chat-name{font-weight:600;font-size:14px}
.chat-status{font-size:11px;color:var(--t3);margin-top:1px}

/* Mode tabs */
.mode-tabs{display:flex;gap:6px}
.mode-tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--t2);font-size:12px;cursor:pointer;transition:.15s}
.mode-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Messages area */
.msgs-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;background:var(--bg)}
.msg-row{display:flex;gap:10px;max-width:88%}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:13px;flex-shrink:0;align-self:flex-end}
.msg-av.ai{background:linear-gradient(135deg,var(--accent),var(--purple))}
.msg-av.user{background:var(--bg4);border:1px solid var(--b2)}
.msg-body{display:flex;flex-direction:column;gap:4px}
.msg-row.user .msg-body{align-items:flex-end}
.bubble{padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word}
.bubble.ai{background:var(--bg3);color:var(--text);border-radius:4px 16px 16px 16px;border:1px solid var(--border)}
.bubble.user{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;border-radius:16px 4px 16px 16px}
.msg-time{font-size:10px;color:var(--t3)}

/* Rich card inside bubble */
.rich-card{background:var(--bg4);border:1px solid var(--b2);border-radius:var(--rs);padding:12px 14px;margin-top:8px;font-size:13px}
.rich-card-title{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:8px;font-weight:500}
.rich-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.rich-row:last-child{border-bottom:none}
.rich-label{color:var(--t2)}
.rich-val{color:var(--text);font-weight:500}
.patient-card-mini{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.patient-card-mini:last-child{border-bottom:none}
.appt-card{background:var(--bg5);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--accent)}
.appt-card.comp{border-left-color:var(--green)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.stat-box{background:var(--bg5);border-radius:6px;padding:8px 10px;text-align:center}
.stat-n{font-size:20px;font-weight:700}
.stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;margin-top:2px}

/* Typing indicator */
.typing-row{display:flex;gap:10px;align-items:center}
.typing-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:4px 16px 16px 16px;padding:12px 16px;display:flex;gap:5px}
.tdot{width:7px;height:7px;background:var(--t3);border-radius:50%;animation:td .7s ease infinite}
.tdot:nth-child(2){animation-delay:.15s}.tdot:nth-child(3){animation-delay:.3s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.6}30%{transform:translateY(-5px);opacity:1}}

/* Input bar */
.chat-input-bar{padding:14px 18px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.chat-textarea{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;color:var(--text);font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.5;transition:border .15s;font-family:inherit}
.chat-textarea:focus{border-color:var(--accent)}
.send-btn{width:40px;height:40px;border-radius:var(--rs);background:var(--accent);border:none;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:.15s}
.send-btn:hover{background:#2563eb}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-icon{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Right: context panel */
.ctx-panel{width:280px;background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.ctx-section{padding:16px;border-bottom:1px solid var(--border)}
.ctx-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:10px;font-weight:500}
.quick-btn{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg3);color:var(--t2);font-size:12px;cursor:pointer;margin-bottom:5px;transition:.15s;line-height:1.4}
.quick-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--b2)}
.booked-box{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:var(--rs);padding:12px}
.booked-title{color:var(--green);font-weight:600;font-size:13px;margin-bottom:8px}
.booked-row{display:flex;gap:6px;align-items:flex-start;font-size:12px;color:var(--t2);margin-bottom:4px}

/* ── WA sim ── */
.wa-wrap{background:#060d1a;border-radius:var(--rs);padding:12px;max-height:200px;overflow-y:auto;margin-top:8px;border:1px solid #0d1f30}
.wa-msg{display:flex;margin-bottom:7px}
.wa-msg.r{justify-content:flex-end}
.wa-b{border-radius:8px;padding:8px 11px;max-width:84%;font-size:12px;line-height:1.5;white-space:pre-wrap}
.wa-cli{background:#1a3a2a;border:1px solid #2a5a3a;color:#86efac}
.wa-pat{background:#1a2a4a;border:1px solid #1e3a6e;color:#93c5fd}
.wa-t{font-size:9px;color:var(--t3);text-align:right;margin-top:3px}

/* ── Misc ── */
.section-t{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text)}
.divider{height:1px;background:var(--border);margin:14px 0}
.empty{text-align:center;padding:36px;color:var(--t3);font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
</style>
</head>
<body>
<div id="root"><div style="display:grid;place-items:center;height:100vh;color:#64748b;font-size:14px;gap:8px">
  <div style="font-size:24px">⚕</div>
  <div>Loading MediFlow…</div>
</div></div>

<script>
/* ═══════════════════════════════════════════════
   DATA STORE
═══════════════════════════════════════════════ */
const S = {
  page:'dashboard',
  collapsed:false,
  patients:[
    {id:'p1',name:'Priya Sharma',phone:'+91 98201 11111',dob:'1990-03-15',blood:'O+',allergies:'Penicillin',gender:'Female'},
    {id:'p2',name:'Arjun Mehta',phone:'+91 98202 22222',dob:'1985-07-22',blood:'A+',allergies:'None',gender:'Male'},
    {id:'p3',name:'Sunita Patel',phone:'+91 98203 33333',dob:'1972-11-08',blood:'B+',allergies:'Sulfa drugs',gender:'Female'},
    {id:'p4',name:'Rahul Desai',phone:'+91 98204 44444',dob:'1998-01-30',blood:'AB-',allergies:'None',gender:'Male'},
    {id:'p5',name:'Meera Joshi',phone:'+91 98205 55555',dob:'1965-05-12',blood:'A-',allergies:'Aspirin',gender:'Female'},
  ],
  appointments:[
    {id:'a1',pid:'p1',pname:'Priya Sharma',date:'2026-04-05',time:'10:00',symptoms:'Fever, persistent headache since 3 days',status:'upcoming',notes:'',rx:[]},
    {id:'a2',pid:'p2',pname:'Arjun Mehta',date:'2026-04-02',time:'11:30',symptoms:'Lower back pain, difficulty standing',status:'completed',notes:'Muscle strain due to posture. Rest advised for 3 days. Apply heat compress.',rx:[{name:'Ibuprofen 400mg',dose:'Twice daily after meals',days:5},{name:'Muscle relaxant (Meftal Spas)',dose:'Once at night',days:3}]},
    {id:'a3',pid:'p3',pname:'Sunita Patel',date:'2026-04-01',time:'09:00',symptoms:'Diabetes type-2 follow-up, blurred vision',status:'completed',notes:'HbA1c stable at 6.8. BP slightly elevated at 140/90. Advised to reduce salt intake.',rx:[{name:'Metformin 500mg',dose:'Once daily with dinner',days:30},{name:'Amlodipine 5mg',dose:'Once daily morning',days:30}]},
    {id:'a4',pid:'p4',pname:'Rahul Desai',date:'2026-04-07',time:'14:00',symptoms:'Persistent cough, mild fever (99.8°F), sore throat',status:'upcoming',notes:'',rx:[]},
    {id:'a5',pid:'p5',pname:'Meera Joshi',date:'2026-04-03',time:'16:00',symptoms:'Knee pain, swelling in left knee',status:'upcoming',notes:'',rx:[]},
    {id:'a6',pid:'p1',pname:'Priya Sharma',date:'2026-03-15',time:'10:30',symptoms:'Seasonal allergies, runny nose',status:'completed',notes:'Allergic rhinitis confirmed. Avoid dust exposure.',rx:[{name:'Cetirizine 10mg',dose:'Once daily at bedtime',days:10}]},
  ],
  followUps:[
    {id:'f1',pid:'p2',pname:'Arjun Mehta',aid:'a2',sent:'2026-04-02T18:00:00',resp:'yes',adhere:true,note:'Patient reported feeling better, back pain reduced significantly'},
    {id:'f2',pid:'p3',pname:'Sunita Patel',aid:'a3',sent:'2026-04-01T18:00:00',resp:'no',adhere:false,note:'Reported vision still blurry, rebooked for April 8'},
    {id:'f3',pid:'p1',pname:'Priya Sharma',aid:'a6',sent:'2026-03-15T19:00:00',resp:'yes',adhere:true,note:'Allergy symptoms resolved after 3 days'},
  ],
  // Chat state
  chatMode:'booking',
  chatHistory:[],   // [{role, content, time, richData}]
  chatBusy:false,
  booked:null,
  _collect:{},      // booking collection state
  // Other UI state
  apptFilter:'all',
  patSearch:'',
  selPat:null,
  modalAppt:null,
  modalRx:[],
  modalNotes:'',
  waMessages:{},
  simulating:null,
};

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
const COLORS=['#3b82f6','#8b5cf6','#ec4899','#22c55e','#f59e0b','#06b6d4','#f97316'];
function avc(n){let h=0;for(let c of(n||''))h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h]}
function ini(n){return(n||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()||'?'}
function fd(d){if(!d)return'—';try{return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}catch{return d}}
function ft(t){if(!t)return'';const[h,m]=t.split(':');const hr=parseInt(h);return`${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`}
function uid(){return 'x'+Date.now()+Math.random().toString(36).slice(2,5)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function now(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}

/* ═══════════════════════════════════════════════
   CHAT ENGINE — Intent Detection + Rich Responses
═══════════════════════════════════════════════ */

// Intent types the chat understands
const INTENTS = {
  SHOW_PATIENTS:      /\b(patients?|all patients?|list patients?|show patients?|patient list)\b/i,
  SHOW_APPOINTMENTS:  /\b(appointments?|all appointments?|show appointments?|schedule|calendar)\b/i,
  UPCOMING:           /\b(upcoming|today|tomorrow|next|scheduled)\b.*\b(appointments?|patients?|visits?)\b|\bwho.*coming\b|\bwho.*today\b/i,
  COMPLETED:          /\b(completed?|done|finished|past|previous)\b.*\b(appointments?|visits?)\b/i,
  FOLLOWUP_STATUS:    /\b(follow.?up|followup|whatsapp|pending|sent)\b/i,
  ANALYTICS:          /\b(stats?|analytics?|report|summary|overview|numbers?|metrics?|performance)\b/i,
  PATIENT_LOOKUP:     /\b(tell me about|show me|lookup|find|search|who is|patient named?|info (on|about))\b/i,
  REBOOK:             /\b(rebook|re.book|rebooking|needs? rebooking)\b/i,
  MEDICINE:           /\b(medicine|medication|prescription|rx|drug|dose)\b/i,
  GREETING:           /^(hi|hello|hey|good morning|good afternoon|namaste|hii+|howdy)[\s!?.]*$/i,
  HELP:               /\b(help|what can you do|commands?|options?)\b/i,
};

function detectIntent(msg) {
  for (const [intent, regex] of Object.entries(INTENTS)) {
    if (regex.test(msg)) return intent;
  }
  // Patient name lookup
  for (const p of S.patients) {
    const parts = p.name.toLowerCase().split(' ');
    if (parts.some(part => msg.toLowerCase().includes(part))) return 'NAMED_PATIENT';
  }
  return 'UNKNOWN';
}

function findPatientByMsg(msg) {
  const lower = msg.toLowerCase();
  return S.patients.find(p =>
    p.name.toLowerCase().split(' ').some(w => w.length > 2 && lower.includes(w))
  );
}

// Generate rich response object based on intent + clinic data
function generateDoctorResponse(msg) {
  const intent = detectIntent(msg);
  const lower = msg.toLowerCase();

  switch (intent) {
    case 'GREETING':
      return { text: `Hello Doctor! 👋 I'm MedAssist, your AI assistant.\n\nI have real-time access to all ${S.patients.length} patients, ${S.appointments.length} appointments, and ${S.followUps.length} follow-up records.\n\nWhat would you like to know?`, rich: null };

    case 'HELP':
      return { text: `Here's what I can help you with:`, rich: {
        type:'help',
        items:['📋 "Show all patients" — patient list','📅 "Upcoming appointments" — today\'s schedule','✅ "Completed appointments" — past visits','👤 "Tell me about Arjun Mehta" — patient history','💊 "Prescriptions for Priya" — medication details','📊 "Show analytics" — clinic stats','📱 "Follow-up status" — WhatsApp follow-up data','🔄 "Who needs rebooking?" — patients to rebook']
      }};

    case 'SHOW_PATIENTS':
      return { text: `Here are all ${S.patients.length} registered patients:`, rich: {type:'patients', data:S.patients}};

    case 'UPCOMING': {
      const up = S.appointments.filter(a=>a.status==='upcoming').sort((a,b)=>new Date(a.date)-new Date(b.date));
      return { text: `${up.length} upcoming appointment${up.length!==1?'s':''} scheduled:`, rich: {type:'appointments', data:up, badge:'upcoming'}};
    }

    case 'COMPLETED': {
      const comp = S.appointments.filter(a=>a.status==='completed').sort((a,b)=>new Date(b.date)-new Date(a.date));
      return { text: `${comp.length} completed appointment${comp.length!==1?'s':''} on record:`, rich: {type:'appointments', data:comp, badge:'completed'}};
    }

    case 'SHOW_APPOINTMENTS': {
      const all = [...S.appointments].sort((a,b)=>new Date(b.date)-new Date(a.date));
      return { text: `All ${all.length} appointments across your clinic:`, rich: {type:'appointments', data:all, badge:'all'}};
    }

    case 'FOLLOWUP_STATUS': {
      const sent = S.followUps.length;
      const ok = S.followUps.filter(f=>f.resp==='yes').length;
      const rebook = S.followUps.filter(f=>f.resp==='no').length;
      const pending = S.appointments.filter(a=>a.status==='completed'&&!S.followUps.find(f=>f.aid===a.id));
      return { text: `Follow-up report for your clinic:`, rich: {type:'followups', data:S.followUps, sent, ok, rebook, pending:pending.length}};
    }

    case 'ANALYTICS': {
      const total=S.appointments.length, comp=S.appointments.filter(a=>a.status==='completed').length;
      const up=S.appointments.filter(a=>a.status==='upcoming').length;
      const adhere=S.followUps.length?Math.round(S.followUps.filter(f=>f.adhere).length/S.followUps.length*100):0;
      return { text:`Clinic performance overview:`, rich:{type:'analytics',total,comp,up,adhere,patients:S.patients.length,followUps:S.followUps.length}};
    }

    case 'REBOOK': {
      const toRebook = S.followUps.filter(f=>f.resp==='no').map(f=>{
        const appt=S.appointments.find(a=>a.id===f.aid);
        const pat=S.patients.find(p=>p.id===f.pid);
        return{...f,appt,pat};
      });
      return { text:`${toRebook.length} patient${toRebook.length!==1?'s':''} need${toRebook.length===1?'s':''} rebooking:`, rich:{type:'rebook',data:toRebook}};
    }

    case 'NAMED_PATIENT':
    case 'PATIENT_LOOKUP': {
      const pat = findPatientByMsg(msg);
      if (!pat) return { text:`I couldn't find a patient matching that name. Try "show all patients" to see the full list.`, rich:null};
      const appts = S.appointments.filter(a=>a.pid===pat.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
      const fus = S.followUps.filter(f=>f.pid===pat.id);
      return { text:`Here's the complete profile for **${pat.name}**:`, rich:{type:'patient_profile',pat,appts,fus}};
    }

    case 'MEDICINE': {
      const pat = findPatientByMsg(msg);
      if (pat) {
        const appts = S.appointments.filter(a=>a.pid===pat.id&&a.rx.length>0);
        return { text:`Prescription history for **${pat.name}**:`, rich:{type:'prescriptions',pat,appts}};
      }
      // General meds across all completed
      const withRx = S.appointments.filter(a=>a.rx.length>0);
      return { text:`Prescription records across ${withRx.length} appointments:`, rich:{type:'prescriptions',appts:withRx}};
    }

    default:
      // Fuzzy: try to find a patient name
      const maybePat = findPatientByMsg(msg);
      if (maybePat) {
        const appts=S.appointments.filter(a=>a.pid===maybePat.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
        const fus=S.followUps.filter(f=>f.pid===maybePat.id);
        return {text:`Here's what I found for **${maybePat.name}**:`,rich:{type:'patient_profile',pat:maybePat,appts,fus}};
      }
      return { text:`I'm not sure I understood that fully. Try asking:\n• "Show upcoming appointments"\n• "Tell me about [patient name]"\n• "Show analytics"\n• "Follow-up status"`, rich:null};
  }
}

// Booking bot state machine
function handleBookingMsg(msg) {
  const c = S._collect;
  const lower = msg.toLowerCase().trim();

  // Reset / start over
  if (lower==='reset'||lower==='start over'||lower==='restart') {
    S._collect={};
    return {text:`No problem! Let's start fresh. 😊\n\nCould you please tell me your **full name**?`,rich:null};
  }

  // Step 1: Name
  if (!c.name) {
    // Skip greetings
    if (INTENTS.GREETING.test(lower)) {
      return {text:`Hi there! 👋 I'm Medi, your AI appointment assistant at City Care Clinic.\n\nTo get started, could you please tell me your **full name**?`,rich:null};
    }
    // Check if it looks like a name (not a question)
    if (lower.includes('?')||lower.length<2) {
      return {text:`Sure! Let me first get your name. Could you share your **full name** please?`,rich:null};
    }
    // Check if existing patient
    const existing = S.patients.find(p=>p.name.toLowerCase().includes(lower)||lower.includes(p.name.toLowerCase().split(' ')[0].toLowerCase()));
    if (existing) {
      c.name = existing.name;
      c.pid = existing.id;
      c.phone = existing.phone;
      return {text:`Welcome back, **${existing.name}**! 😊 I found your records.\n\nYour registered number is ${existing.phone} — shall I use this, or would you like to use a different number?`,rich:{type:'patient_mini',pat:existing}};
    }
    c.name = msg.trim();
    return {text:`Nice to meet you, **${c.name}**! 😊\n\nCould you please share your **phone number** so we can reach you?`,rich:null};
  }

  // Confirm phone for returning patient
  if (c.name && c.phone && !c.phoneConfirmed) {
    if (lower.includes('yes')||lower.includes('use this')||lower.includes('same')||lower.includes('correct')) {
      c.phoneConfirmed = true;
      return {text:`Great! What **date** would you prefer for your appointment?\n\n📅 We're open Monday – Saturday, 9 AM – 6 PM.`,rich:null};
    } else if (msg.match(/\d{5,}/)) {
      c.phone = msg.replace(/[^\d+]/g,'');
      c.phoneConfirmed = true;
      return {text:`Got it! I've updated your number to **${c.phone}**.\n\nWhat **date** would you prefer? (e.g. "April 7", "this Friday", "next Tuesday")`,rich:null};
    }
    return {text:`Just to confirm — should I use **${c.phone}** for this appointment? (Reply Yes or share a different number)`,rich:null};
  }

  // Step 2: Phone
  if (!c.phone) {
    const phoneMatch = msg.match(/[\d\s\-+()]{8,}/);
    if (!phoneMatch) {
      return {text:`Could you share your **10-digit mobile number**? We'll use it to send you appointment reminders. 📱`,rich:null};
    }
    c.phone = msg.trim();
    c.phoneConfirmed = true;
    return {text:`Perfect, saved your number as **${c.phone}**. ✅\n\nWhat **date** would you prefer?\n\n📅 We're open Monday – Saturday, 9 AM to 6 PM.`,rich:null};
  }

  // Step 3: Date
  if (!c.date) {
    const dateMap = {
      'today':'2026-04-02','tomorrow':'2026-04-03','day after':'2026-04-04',
      'monday':'2026-04-06','tuesday':'2026-04-07','wednesday':'2026-04-08',
      'thursday':'2026-04-09','friday':'2026-04-10','saturday':'2026-04-11',
    };
    // Check keyword
    for (const [k,v] of Object.entries(dateMap)) {
      if (lower.includes(k)){c.date=v;break}
    }
    // Check April N pattern
    if (!c.date) {
      const m=msg.match(/april\s*(\d+)/i)||msg.match(/(\d{1,2})[\/\-](\d{1,2})/);
      if(m)c.date=`2026-04-${String(m[1]).padStart(2,'0')}`;
    }
    if (!c.date) {
      return {text:`I didn't quite catch the date. Could you mention it like:\n• "April 7"\n• "This Friday"\n• "Next Monday"\n\nWe're open Monday – Saturday.`,rich:null};
    }
    return {text:`Great, noted **${fd(c.date)}**! ✅\n\nWhat **time** would you prefer?\n\n⏰ Available slots: 9 AM – 12 PM (morning) or 12 PM – 6 PM (afternoon)`,rich:{type:'time_slots'}};
  }

  // Step 4: Time
  if (!c.time) {
    const timeMap={'9':['09:00','9 am','9am','nine'],'10':['10:00','10 am','10am','ten'],'11':['11:00','11 am','11am','eleven'],'12':['12:00','12 pm','noon','twelve'],'14':['2 pm','2pm','14:00','two pm'],'15':['3 pm','3pm','15:00','three'],'16':['4 pm','4pm','16:00','four'],'17':['5 pm','5pm','17:00','five']};
    for(const[hr,aliases] of Object.entries(timeMap)){
      if(aliases.some(a=>lower.includes(a))||lower.includes(hr+':')){
        c.time=hr.padStart(2,'0')+':00';break;
      }
    }
    if(lower.includes('morning')||lower.includes('forenoon'))c.time='10:00';
    if(lower.includes('afternoon'))c.time='14:00';
    if(lower.includes('evening'))c.time='17:00';
    if(!c.time){
      return {text:`Which time works best for you?\n\n• Morning: 9 AM, 10 AM, 11 AM\n• Afternoon: 12 PM, 2 PM, 3 PM, 4 PM\n• Evening: 5 PM`,rich:null};
    }
    return {text:`Slot at **${ft(c.time)}** on **${fd(c.date)}** looks available! ✅\n\nLastly, what is the **reason for your visit** or any **symptoms** you'd like to share with the doctor?`,rich:null};
  }

  // Step 5: Symptoms
  if (!c.symptoms) {
    if (lower.length < 3) {
      return {text:`Could you briefly describe your **symptoms or reason for visiting**? (e.g. fever, back pain, routine checkup)`,rich:null};
    }
    c.symptoms = msg.trim();

    // All collected — show confirmation
    return {text:`Here's a summary of your appointment:`,rich:{
      type:'booking_confirm',
      name:c.name, phone:c.phone, date:c.date, time:c.time, symptoms:c.symptoms,
      isNew:!c.pid
    }};
  }

  // Step 6: Confirmation
  if (c.symptoms && !c.confirmed) {
    if (lower.includes('yes')||lower.includes('confirm')||lower.includes('correct')||lower.includes('ok')||lower==='y') {
      // Create the appointment
      const newPat = c.pid ? null : {id:uid(),name:c.name,phone:c.phone,dob:'',blood:'',allergies:'',gender:''};
      if(newPat) S.patients.push(newPat);
      const newAppt = {id:uid(),pid:c.pid||newPat.id,pname:c.name,date:c.date,time:c.time,symptoms:c.symptoms,status:'upcoming',notes:'',rx:[]};
      S.appointments.push(newAppt);
      S.booked={...newAppt};
      S._collect={};
      return {text:`🎉 Your appointment has been **confirmed**! Here are your details:`,rich:{type:'booking_done',appt:newAppt}};
    }
    if (lower.includes('no')||lower.includes('change')||lower.includes('wrong')) {
      S._collect={};
      return {text:`No problem! Let's start over. What's your **name**?`,rich:null};
    }
    return {text:`Please reply **YES** to confirm or **NO** to start over.`,rich:null};
  }

  // Post-booking
  if (c.confirmed || S.booked) {
    S._collect={};
    return {text:`Your appointment is already booked! 😊\n\nIs there anything else I can help you with? Type "book" to make a new appointment.`,rich:null};
  }

  return {text:`I didn't catch that. Could you try again? If you'd like to book an appointment, just tell me your name.`,rich:null};
}

    default:

}

/* ═══════════════════════════════════════════════
   CHAT ACTIONS
═══════════════════════════════════════════════ */
function confirmBookingFromBtn() {
  addUserMsg('Yes, confirm my appointment');
  processChat('Yes, confirm my appointment');
}
function cancelBookingFromBtn() {
  S._collect={};
  addUserMsg('No, start over');
  processChat('No, start over');
}
function setTimeFromSlot(t) {
  const msg = `I'd prefer ${t}`;
  addUserMsg(msg);
  processChat(msg);
}

function addUserMsg(text) {
  S.chatHistory.push({role:'user',content:text,time:now()});
  renderChat();
  scrollChat();
}

function addAIMsg(text, rich) {
  S.chatHistory.push({role:'assistant',content:text,time:now(),richData:rich});
  S.chatBusy = false;
  renderChat();
  scrollChat();
}

function scrollChat() {
  setTimeout(()=>{
    const el=document.getElementById('msgs-area');
    if(el) el.scrollTop=el.scrollHeight;
  },30);
}

function renderChat() {
  const area = document.getElementById('msgs-area');
  if(!area) return;
  area.innerHTML = buildMsgs();
  scrollChat();
}

function switchMode(m) {
  S.chatMode=m;
  S.chatHistory=[];
  S.booked=null;
  S._collect={};
  renderPage();
}

async function sendMsg() {
  const inp = document.getElementById('chat-inp');
  if(!inp) return;
  const text = inp.value.trim();
  if(!text || S.chatBusy) return;
  inp.value='';
  inp.style.height='auto';

  S.chatBusy = true;
  addUserMsg(text);

  // Show typing
  const area=document.getElementById('msgs-area');
  if(area){
    const typEl=document.createElement('div');
    typEl.id='typing-row';
    typEl.className='typing-row';
    typEl.innerHTML=`<div class="ai-ring msg-av ai" style="width:30px;height:30px;font-size:13px">🤖</div><div class="typing-bubble"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
    area.appendChild(typEl);
    scrollChat();
  }

  await new Promise(r=>setTimeout(r,600+Math.random()*400));

  // Remove typing
  const typEl=document.getElementById('typing-row');
  if(typEl)typEl.remove();

  if(S.chatMode==='doctor') {
    const {text:respText, rich} = generateDoctorResponse(text);
    addAIMsg(respText, rich);
  } else {
    const {text:respText, rich} = handleBookingMsg(text);
    addAIMsg(respText, rich);
  }
}

function buildMsgs() {
  const mode=S.chatMode;
  if(S.chatHistory.length===0){
    const greeting = mode==='doctor'
      ? `Hello, Doctor! 👨‍⚕️ I'm <b>MedAssist</b>, your AI clinic assistant.<br><br>I have real-time access to all patient records, appointments, and follow-ups.<br><br>Try asking:<br>• <i>Show upcoming appointments</i><br>• <i>Tell me about Arjun Mehta</i><br>• <i>Show analytics</i>`
      : `Hi! 👋 I'm <b>Medi</b>, your AI appointment assistant at City Care Clinic.<br><br>I'll help you book an appointment in just a few steps.<br><br>To get started, could you please tell me your <b>full name</b>?`;
    return `<div class="msg-row"><div class="ai-ring msg-av ai" style="width:30px;height:30px;font-size:13px">${mode==='doctor'?'👨‍⚕️':'🤖'}</div>
      <div class="msg-body"><div class="bubble ai">${greeting}</div><div class="msg-time">${now()}</div></div></div>`;
  }

  return S.chatHistory.map(m=>{
    const isUser = m.role==='user';
    const text = m.content.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    if(isUser) {
      return `<div class="msg-row user">
        <div class="msg-av user" style="font-size:13px">👤</div>
        <div class="msg-body">
          <div class="bubble user">${esc(m.content)}</div>
          <div class="msg-time">${m.time}</div>
        </div>
      </div>`;
    }
    return `<div class="msg-row">
      <div class="ai-ring msg-av ai" style="width:30px;height:30px;font-size:13px">${S.chatMode==='doctor'?'👨‍⚕️':'🤖'}</div>
      <div class="msg-body">
        <div class="bubble ai">${text}</div>
        ${m.richData ? renderRich(m.richData) : ''}
        <div class="msg-time">${m.time}</div>
      </div>
    </div>`;
  }).join('');
}

        return`<div class="card" style="cursor:pointer;transition:border .15s" onmouseover="this.style.borderColor='var(--b2)'" onmouseout="this.style.borderColor='var(--border)'" onclick="S.selPat='${p.id}';renderPage()">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <div class="av" style="width:44px;height:44px;font-size:17px;background:${avc(p.name)}">${ini(p.name)}</div>
            <div><div style="font-weight:600">${esc(p.name)}</div><div style="font-size:12px;color:var(--t3)">${esc(p.phone)}</div></div>
          </div>
          <div>
            ${p.blood?`<span class="tag">🩸 ${esc(p.blood)}</span>`:''}
            <span class="tag">📅 ${visits} visit${visits!==1?'s':''}</span>
            ${p.allergies&&p.allergies!=='None'?`<span class="tag" style="color:var(--amber);border-color:rgba(245,158,11,.2)">⚠ ${esc(p.allergies)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
    ${list.length===0?'<div class="empty">No patients found</div>':''}
  </div>`;
}

function buildFollowUp(){
  const done=S.appointments.filter(a=>a.status==='completed');
  return`
  <div class="topbar">
    <div><div class="pg-title">WhatsApp Follow-Ups</div><div class="pg-sub">${S.followUps.length} sent · ${S.followUps.filter(f=>f.resp==='no').length} rebookings</div></div>
  </div>
  <div class="content">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px">
      ${done.map(a=>{
        const fu=S.followUps.find(f=>f.aid===a.id);
        const wa=S.waMessages[a.id]||[];
        return`<div class="card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div>
              <div style="font-weight:600">${esc(a.pname)}</div>
              <div style="font-size:12px;color:var(--t3);margin-top:2px">${fd(a.date)} · ${esc(a.symptoms)}</div>
            </div>
            ${fu?`<span class="badge ${fu.resp==='yes'?'b-green':'b-amber'}">${fu.resp==='yes'?'✓ Well':'⚠ Rebooked'}</span>`
              :`<button class="btn btn-p btn-sm" onclick="simFollowUp('${a.id}')" ${S.simulating===a.id?'disabled':''}>▶ Simulate</button>`}
          </div>
          ${wa.length?`<div class="wa-wrap" id="wa-${a.id}">
            <div style="font-size:10px;color:var(--t3);text-align:center;margin-bottom:8px;letter-spacing:.5px">📱 WHATSAPP SIMULATION</div>
            ${wa.map(m=>`<div class="wa-msg ${m.from==='patient'?'r':''}">
              <div class="wa-b ${m.from==='clinic'?'wa-cli':'wa-pat'}">${esc(m.text)}<div class="wa-t">${m.from==='clinic'?'🏥 Clinic':'👤 Patient'} · now</div></div>
            </div>`).join('')}
          </div>`:''}
          ${fu&&wa.length===0?`<div style="font-size:12px;color:var(--t3);background:var(--bg3);border-radius:var(--rs);padding:8px 10px;border:1px solid var(--border)">${esc(fu.note)}</div>`:''}
          ${a.rx.length?`<div style="margin-top:10px"><div style="font-size:10px;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px">Prescriptions</div>${a.rx.map(r=>`<span class="tag" style="margin-right:4px;margin-bottom:4px">💊 ${esc(r.name)}</span>`).join('')}</div>`:''}
        </div>`;
      }).join('')}
      ${done.length===0?'<div class="empty">No completed appointments yet</div>':''}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════
   APPOINTMENT MODAL ACTIONS
═══════════════════════════════════════════════ */
function openModal(id){
  S.modalAppt=S.appointments.find(a=>a.id===id);
  S.modalRx=[...(S.modalAppt?.rx||[])];
  S.modalNotes=S.modalAppt?.notes||'';
  renderPage();
}
function closeModal(){S.modalAppt=null;renderPage()}
function addRx(){
  const n=document.getElementById('rx-name')?.value?.trim();
  if(!n)return;
  S.modalRx=[...S.modalRx,{name:n,dose:document.getElementById('rx-dose')?.value||'',days:document.getElementById('rx-days')?.value||''}];
  renderPage();
}
function removeRx(i){S.modalRx=S.modalRx.filter((_,idx)=>idx!==i);renderPage()}
function saveAppt(){
  const a=S.appointments.find(x=>x.id===S.modalAppt.id);
  if(a){a.notes=S.modalNotes||document.getElementById('modal-notes')?.value||'';a.rx=S.modalRx;a.status='completed';}
  closeModal();
}
async function aiSuggest(){
  const btn=event.target;btn.textContent='⟳…';btn.disabled=true;
  const a=S.modalAppt;
  // Simulate AI suggestion based on symptoms
  await new Promise(r=>setTimeout(r,800));
  const symLow=(a.symptoms||'').toLowerCase();
  let notes='',meds=[];
  if(symLow.includes('fever')||symLow.includes('headache')){
    notes=`Patient presents with ${a.symptoms.toLowerCase()}. Likely viral infection. Monitor temperature and hydration.`;
    meds=[{name:'Paracetamol 650mg',dose:'Every 6 hours as needed',days:5},{name:'ORS Sachets',dose:'2-3 sachets daily',days:3}];
  } else if(symLow.includes('back')||symLow.includes('pain')){
    notes=`Patient reports ${a.symptoms.toLowerCase()}. Musculoskeletal origin likely. Rest and physiotherapy recommended.`;
    meds=[{name:'Ibuprofen 400mg',dose:'Twice daily after meals',days:5}];
  } else if(symLow.includes('cough')||symLow.includes('cold')){
    notes=`Patient presents with ${a.symptoms.toLowerCase()}. Viral URTI suspected. Symptomatic management advised.`;
    meds=[{name:'Cetirizine 10mg',dose:'Once daily at night',days:5},{name:'Dextromethorphan syrup',dose:'5ml thrice daily',days:5}];
  } else if(symLow.includes('diabetes')||symLow.includes('follow')) {
    notes=`Routine follow-up for ${a.symptoms.toLowerCase()}. Assess vitals and lab reports. Medication compliance reviewed.`;
    meds=[{name:'Continue current medication',dose:'As prescribed',days:30}];
  } else {
    notes=`Patient presents with ${a.symptoms.toLowerCase()}. Clinical assessment required. Further investigation may be needed.`;
    meds=[{name:'Paracetamol 500mg',dose:'As needed',days:3}];
  }
  S.modalNotes=notes+'  [AI-suggested — please review]';
  S.modalRx=meds;
  renderPage();
}

/* ═══════════════════════════════════════════════
   WHATSAPP SIMULATION
═══════════════════════════════════════════════ */
async function simFollowUp(aid){
  const a=S.appointments.find(x=>x.id===aid);
  if(!a||S.simulating)return;
  S.simulating=aid;
  S.waMessages={...S.waMessages,[aid]:[]};
  renderPage();
  const add=(from,text)=>{
    S.waMessages={...S.waMessages,[aid]:[...(S.waMessages[aid]||[]),{from,text}]};
    renderPage();
    const el=document.getElementById('wa-'+aid);
    if(el)el.scrollTop=el.scrollHeight;
  };
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  await delay(700);add('clinic',`Hi ${a.pname.split(' ')[0]}! 👋 Hope you're recovering well after your visit on ${fd(a.date)}.`);
  await delay(900);add('clinic',`⏰ Medicine Reminder:\n${a.rx.map(r=>`• ${r.name} — ${r.dose}`).join('\n')||'Take your medicines as prescribed.'}`);
  await delay(900);add('clinic',`Are you feeling better?\n✅ Reply YES — Feeling okay\n❌ Reply NO — Still unwell`);
  await delay(1400);
  const resp=Math.random()>0.4?'yes':'no';
  add('patient',resp==='yes'?'YES ✅ Feeling much better, thank you!':'NO ❌ Still having discomfort');
  if(resp==='no'){await delay(800);add('clinic',`Sorry to hear that 😔 Let's get you checked.\n\n🔗 Book follow-up:\ncitycareclinic.com/book\n\n📞 Call: +91 98200 00000`);}
  S.followUps=[...S.followUps,{id:uid(),pid:a.pid,pname:a.pname,aid:a.id,sent:new Date().toISOString(),resp,adhere:resp==='yes',note:resp==='yes'?'Patient doing well':'Rebook triggered'}];
  S.simulating=null;
  renderPage();
}

/* ═══════════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════════ */
function renderPage(){
  const col=S.collapsed;
  const nav=[{id:'dashboard',i:'📊',l:'Dashboard'},{id:'appointments',i:'📅',l:'Appointments'},{id:'patients',i:'👥',l:'Patients'},{id:'booking',i:'🤖',l:'AI Chat'},{id:'followup',i:'💬',l:'Follow-Ups'}];
  let pageHtml;
  switch(S.page){
    case 'appointments': pageHtml=buildAppointments();break;
    case 'patients': pageHtml=buildPatients();break;
    case 'booking': pageHtml=buildChat();break;
    case 'followup': pageHtml=buildFollowUp();break;
    default: pageHtml=buildDashboard();
  }
  document.getElementById('root').innerHTML=`<div class="shell">
    <aside class="sidebar ${col?'col':''}">
      <div class="sb-logo">
        <div class="logo-box">+</div>
        ${col?'':'<div class="logo-txt"><span>Medi</span>Flow</div>'}
      </div>
      <nav class="sb-nav">
        ${nav.map(n=>`<button class="nav-btn ${S.page===n.id?'act':''}" onclick="S.page='${n.id}';S.selPat=null;renderPage()">
          <span class="nav-icon">${n.i}</span>${col?'':'<span>'+n.l+'</span>'}
        </button>`).join('')}
      </nav>
      <div class="sb-foot">
        <div class="status-pill"><div class="blink"></div>${col?'':'<span style="font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden">City Care Clinic</span>'}</div>
        <button style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:7px;color:var(--t2);cursor:pointer;font-size:12px;transition:.15s;text-align:center" onclick="S.collapsed=!S.collapsed;renderPage()">${col?'→ Expand':'← Collapse'}</button>
      </div>
    </aside>
    <div class="main">${pageHtml}</div>
  </div>`;

  // Focus chat input if on booking page
  if(S.page==='booking') {
    setTimeout(()=>{const el=document.getElementById('chat-inp');if(el)el.focus()},50);
  }
}

renderPage();
</script>
